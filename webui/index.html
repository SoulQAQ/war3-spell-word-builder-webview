<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC3技能文本生成器</title>
    <!-- Inter Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS变量定义 - 基于UI/UX Pro Max设计系统 */
        :root {
            /* 主色调 - Teal系列 */
            --primary-color: #0D9488;
            --primary-hover: #0F766E;
            --primary-light: rgba(13, 148, 136, 0.1);
            --primary-ring: rgba(13, 148, 136, 0.3);

            /* 功能色 */
            --danger-color: #DC2626;
            --danger-hover: #B91C1C;
            --success-color: #059669;
            --warning-color: #EA580C;
            --accent-color: #F97316;

            /* 背景色 */
            --bg-color: #F0FDFA;
            --card-bg: #FFFFFF;
            --bg-muted: #E8F1F4;

            /* 边框色 */
            --border-color: #99F6E4;
            --border-light: rgba(0, 0, 0, 0.06);

            /* 文字色 */
            --text-primary: #134E4A;
            --text-secondary: #5EEAD4;
            --text-tertiary: #14B8A6;
            --text-placeholder: #9CA3AF;

            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 2px 8px rgba(13, 148, 136, 0.08);
            --shadow-md: 0 4px 12px rgba(13, 148, 136, 0.1);
            --shadow-lg: 0 8px 24px rgba(13, 148, 136, 0.12);

            /* 圆角 */
            --radius: 6px;
            --radius-sm: 4px;
            --radius-lg: 8px;

            /* 过渡 - 符合150-300ms标准 */
            --transition-fast: all 150ms ease-out;
            --transition: all 200ms ease-out;
            --transition-slow: all 300ms ease-out;

            /* 布局 */
            --sidebar-width: 220px;
        }

        /* 减少动画偏好支持 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-primary);
            background: var(--bg-color);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 主布局 */
        .app-layout {
            display: flex;
            height: 100vh;
        }

        /* 左侧边栏 - 资源树 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-primary);
            background: linear-gradient(to bottom, rgba(13, 148, 136, 0.02), transparent);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            background: rgba(13, 148, 136, 0.02);
        }

        .root-drop-target {
            margin: 8px 12px 8px 12px;
            border: 2px dashed var(--border-color);
            color: var(--text-placeholder);
            border-radius: var(--radius);
            text-align: center;
            padding: 8px 12px;
            font-size: 12px;
            transition: var(--transition);
            cursor: pointer;
        }

        .root-drop-target:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .root-drop-target.drag-over {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
            transform: scale(1.02);
        }

        /* 树形结构 */
        .tree-item {
            cursor: pointer;
            user-select: none;
        }

        .tree-row {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            margin: 2px 8px;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
            position: relative;
        }

        .tree-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3px;
            height: 60%;
            background: var(--primary-color);
            border-radius: 0 2px 2px 0;
            transition: transform 150ms ease-out;
        }

        .tree-row:hover {
            background: var(--primary-light);
        }

        .tree-row:hover::before {
            transform: translateY(-50%) scaleY(1);
        }

        .tree-row.selected {
            background: var(--primary-light);
            color: var(--primary-color);
            font-weight: 500;
        }

        .tree-row.selected::before {
            transform: translateY(-50%) scaleY(1);
        }

        .tree-row.drag-over {
            background: var(--primary-light);
            outline: 2px dashed var(--primary-color);
            outline-offset: -2px;
        }

        .tree-row.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .tree-icon {
            width: 18px;
            height: 18px;
            margin-right: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--text-tertiary);
            transition: var(--transition-fast);
        }

        .tree-row:hover .tree-icon {
            color: var(--primary-color);
        }

        .tree-expand {
            width: 18px;
            height: 18px;
            margin-right: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-placeholder);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
        }

        .tree-expand:hover {
            color: var(--primary-color);
            background: var(--primary-light);
        }

        .tree-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }

        .tree-children {
            padding-left: 16px;
            /* 使用CSS Grid实现平滑的高度过渡，避免max-height跳跃 */
            display: grid;
            grid-template-rows: 1fr;
            transition: grid-template-rows 200ms ease-out;
        }

        .tree-children.collapsed {
            grid-template-rows: 0fr;
        }

        /* 内部包装器，确保内容正确流动 */
        .tree-children-inner {
            overflow: hidden;
        }

        /* 右侧主区域 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-color);
        }

        /* Tab栏 */
        .tab-bar {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 24px;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 10;
        }

        .tab-spacer {
            flex: 1;
        }

        .tab-item {
            padding: 12px 24px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            position: relative;
        }

        .tab-item::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: calc(100% - 24px);
            height: 2px;
            background: var(--primary-color);
            border-radius: 2px 2px 0 0;
            transition: transform 200ms ease-out;
        }

        .tab-item:hover {
            color: var(--primary-color);
            background: linear-gradient(to bottom, var(--primary-light), transparent);
        }

        .tab-item.active {
            color: var(--primary-color);
        }

        .tab-item.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        /* Tab内容 */
        .tab-content {
            flex: 1;
            overflow: hidden;
            display: none;
            animation: fadeIn 200ms ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* 编辑Tab布局 */
        .edit-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .edit-left {
            width: 280px;
            min-width: 280px;
            padding: 14px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-y: auto;
            overflow-x: hidden;
            justify-content: flex-start;
            align-items: stretch;
        }

        .edit-left .form-item {
            flex: 0 0 auto;
            min-width: 0;
        }

        .edit-left .spell-preview {
            min-height: 140px;
            max-height: 340px;
        }

        .edit-right {
            flex: 1;
            padding: 14px 18px 78px 18px;
            overflow-y: auto;
            background: var(--bg-color);
        }

        /* 技能预览框 */
        .spell-preview {
            background: rgba(0, 0, 0, 0.75);
            border-radius: var(--radius-lg);
            padding: 14px;
            color: #ffffff;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.6;
            min-height: 120px;
            overflow-y: auto;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
            transition: box-shadow 200ms ease-out;
        }

        .spell-preview:hover {
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
        }

        .spell-preview p {
            margin-bottom: 4px;
        }

        .spell-preview hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.25);
            margin: 8px 0;
        }

        /* 表单样式 */
        .form-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--border-light);
            transition: var(--transition);
        }

        .form-section:hover {
            box-shadow: var(--shadow-md);
        }

        .form-title {
            font-weight: 600;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            min-width: 0;
        }

        .basic-info-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(120px, 0.6fr) minmax(120px, 0.7fr);
            gap: 10px;
            align-items: start;
        }

        .description-row {
            display: grid;
            grid-template-columns: minmax(0, 1.5fr) minmax(220px, 0.8fr);
        }

        .form-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: 32px;
            padding: 0 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 13px;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
            background: var(--card-bg);
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-ring);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            transition: opacity 150ms ease-out;
        }

        .form-input:focus::placeholder {
            opacity: 0.6;
        }

        .form-textarea {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: 58px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
            background: var(--card-bg);
        }

        @media (max-width: 1200px) {
            .basic-info-row {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }

            .description-row {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        @media (max-width: 860px) {
            .basic-info-row {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .form-textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-ring);
            transform: translateY(-1px);
        }

        /* 按钮样式 */
        .btn {
            height: 32px;
            padding: 0 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 300ms ease-out, height 300ms ease-out;
        }

        .btn:active:not(:disabled)::before {
            width: 200px;
            height: 200px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 2px 4px rgba(13, 148, 136, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
            box-shadow: 0 4px 8px rgba(13, 148, 136, 0.4);
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(13, 148, 136, 0.3);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
            box-shadow: 0 2px 4px rgba(5, 150, 105, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            background: #047857;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 2px 4px rgba(220, 38, 38, 0.3);
        }

        .btn-danger:hover:not(:disabled) {
            background: var(--danger-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--bg-muted);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--primary-light);
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-small {
            height: 26px;
            padding: 0 10px;
            font-size: 12px;
        }

        /* 单选按钮组 */
        .radio-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .radio-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            background: var(--card-bg);
        }

        .radio-btn:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
            color: var(--primary-color);
            transform: translateY(-1px);
        }

        .radio-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.4);
            transform: scale(1.02);
        }

        /* 属性列表 */
        .property-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .property-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px;
            background: var(--bg-muted);
            border-radius: var(--radius);
            transition: var(--transition-fast);
            border: 1px solid transparent;
        }

        .property-item:hover {
            background: var(--primary-light);
            border-color: var(--border-color);
        }

        .property-item .form-input {
            flex: 1;
            background: var(--card-bg);
        }

        .property-name-wrap {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        /* 下拉菜单使用fixed定位，避免被overflow容器裁剪 */
        .property-suggest-list {
            position: fixed;
            z-index: 9999;
            min-width: 160px;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--card-bg);
            box-shadow: var(--shadow-md);
            display: none;
        }

        .property-suggest-list.active {
            display: block;
        }

        .property-suggest-item {
            padding: 8px 12px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .property-suggest-item:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .property-suggest-item {
            padding: 8px 12px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .property-suggest-item:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .setting-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-item .form-input {
            flex: 1;
        }

        .property-remove {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-placeholder);
            cursor: pointer;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }

        .property-remove:hover {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger-color);
            transform: scale(1.1);
        }

        .value-param-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .param-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 10px;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.08), rgba(20, 184, 166, 0.03));
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
        }

        .param-hint {
            flex: 1;
            min-width: 0;
            font-size: 12px;
            color: var(--text-tertiary);
            line-height: 1.4;
        }

        .param-chips,
        .param-alerts {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .param-chip,
        .param-alert {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            line-height: 1.2;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-tertiary);
        }

        .param-chip {
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .param-chip:hover {
            border-color: var(--primary-color);
            background: var(--primary-light);
            color: var(--primary-color);
            transform: translateY(-1px);
        }

        .param-alert.warning {
            border-color: rgba(234, 88, 12, 0.35);
            background: rgba(234, 88, 12, 0.08);
            color: var(--warning-color);
        }

        .param-alert.error {
            border-color: rgba(220, 38, 38, 0.35);
            background: rgba(220, 38, 38, 0.08);
            color: var(--danger-color);
        }

        .param-table {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .param-row {
            display: grid;
            grid-template-columns: 56px minmax(90px, 1fr) 110px minmax(92px, 1fr) minmax(92px, 1fr) 44px;
            gap: 8px;
            align-items: center;
            padding: 6px;
            background: var(--bg-muted);
            border: 1px solid transparent;
            border-radius: var(--radius);
            transition: var(--transition-fast);
        }

        .param-row:hover {
            background: var(--primary-light);
            border-color: var(--border-color);
        }

        .param-key {
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            font-weight: 700;
            text-align: center;
            color: var(--primary-color);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            padding: 6px 4px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .param-key:hover {
            background: var(--primary-light);
            border-color: var(--primary-color);
            transform: translateY(-1px);
        }

        .param-row .form-input,
        .param-row .param-type-select {
            height: 30px;
            background: var(--card-bg);
        }

        .param-type-select {
            width: 100%;
            min-width: 0;
            padding: 0 8px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 12px;
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }

        .param-type-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-ring);
        }

        .param-preview {
            grid-column: 1 / -1;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            min-height: 20px;
            padding-left: 2px;
        }

        .param-preview-pill {
            padding: 2px 7px;
            border-radius: 999px;
            background: rgba(13, 148, 136, 0.1);
            color: var(--text-primary);
            font-size: 11px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
        }

        .param-empty {
            padding: 10px 12px;
            border: 1px dashed var(--border-color);
            border-radius: var(--radius);
            color: var(--text-placeholder);
            font-size: 12px;
            background: rgba(255, 255, 255, 0.65);
        }

        .advanced-params {
            display: none;
        }

        .advanced-params.active {
            display: flex;
        }

        @media (max-width: 1080px) {
            .param-row {
                grid-template-columns: 52px minmax(0, 1fr) minmax(96px, 0.8fr) 34px;
            }

            .param-row .property-remove {
                grid-column: 4;
                grid-row: 1;
            }

            .param-row > .form-input:nth-of-type(2),
            .param-row > .param-hint {
                grid-column: 2 / span 2;
            }
        }

        /* 颜色配置 */
        .color-config-item {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding: 8px;
            border-radius: var(--radius);
            transition: var(--transition-fast);
        }

        .color-config-item:hover {
            background: var(--bg-muted);
        }

        .color-config-item label {
            width: 120px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .color-picker {
            width: 44px;
            height: 36px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            padding: 3px;
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .color-picker:hover {
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .color-value {
            font-size: 12px;
            color: var(--text-tertiary);
            font-family: 'SF Mono', Monaco, Consolas, monospace;
        }

        /* 底部操作栏 */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 14px 24px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -4px 12px rgba(13, 148, 136, 0.08);
            gap: 10px;
            position: relative;
            z-index: 20;
        }

        .bottom-left {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-right: auto;
        }

        .bottom-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tree-context-menu {
            position: fixed;
            min-width: 160px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            z-index: 1200;
            padding: 8px 0;
            display: none;
            animation: slideDown 150ms ease-out;
        }

        .tree-context-menu.active {
            display: block;
        }

        .tree-context-item {
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            user-select: none;
            transition: var(--transition-fast);
            border-radius: 0;
        }

        .tree-context-item:first-child {
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .tree-context-item:last-child {
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }

        .tree-context-item:hover {
            background: var(--primary-light);
            color: var(--primary-color);
        }

        .tree-context-item.danger {
            color: var(--danger-color);
        }

        .tree-context-item.danger:hover {
            background: rgba(220, 38, 38, 0.1);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 78, 74, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-slow);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            transform: scale(0.95) translateY(10px);
            transition: var(--transition);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
            background: linear-gradient(to bottom, var(--primary-light), transparent);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            background: var(--bg-muted);
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }

        /* 生成结果 */
        .generate-result {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .generate-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            background: var(--bg-muted);
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            transition: var(--transition-fast);
        }

        .generate-item:hover {
            background: var(--primary-light);
            border-color: var(--primary-color);
        }

        .generate-item .label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-tertiary);
            width: 90px;
            flex-shrink: 0;
        }

        .generate-item .content {
            flex: 1;
            font-size: 12px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            word-break: break-all;
            white-space: pre-wrap;
            color: var(--text-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 24px;
            background: var(--text-primary);
            color: white;
            border-radius: var(--radius-lg);
            font-size: 13px;
            font-weight: 500;
            z-index: 1001;
            transform: translateX(120%);
            transition: transform 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast.error {
            background: var(--danger-color);
        }

        .toast.success {
            background: var(--success-color);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
            transition: background 150ms ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-placeholder);
            font-size: 14px;
            gap: 12px;
            padding: 40px;
        }

        .empty-state::before {
            content: '';
            width: 48px;
            height: 48px;
            background: var(--bg-muted);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 输入组 */
        .input-group {
            display: flex;
            gap: 10px;
        }

        .input-group .form-input {
            flex: 1;
        }

        /* 选中文本样式 */
        ::selection {
            background: var(--primary-color);
            color: white;
        }

        /* 页面加载动画 */
        @keyframes pageLoad {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-layout {
            animation: pageLoad 300ms ease-out;
        }

        /* 表单区域交错入场动画 */
        .form-section {
            animation: fadeIn 200ms ease-out backwards;
        }

        .form-section:nth-child(1) { animation-delay: 50ms; }
        .form-section:nth-child(2) { animation-delay: 100ms; }
        .form-section:nth-child(3) { animation-delay: 150ms; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 按钮点击反馈 */
        .btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        /* 输入框聚焦动画 */
        .form-input:focus,
        .form-textarea:focus {
            transform: translateY(-1px);
        }

        /* 页面加载入场动画 */
        .app-layout {
            animation: pageLoad 300ms ease-out;
        }

        @keyframes pageLoad {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 模态框入场增强 */
        .modal {
            animation: modalPopIn 200ms cubic-bezier(0.34, 1.26, 0.64, 1);
        }

        @keyframes modalPopIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(8px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>技能列表</span>
                <button class="btn btn-small btn-secondary" onclick="showNewCategoryModal()">+ 分类</button>
            </div>
            <div class="sidebar-content" id="treeContainer">
                <div class="root-drop-target"
                     ondragover="onRootDragOver(event)"
                     ondragleave="onRootDragLeave(event)"
                     ondrop="onRootDrop(event)">
                    拖到这里移动到根目录
                </div>
                <!-- 树形结构动态渲染 -->
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-small btn-secondary" style="width: 100%;" onclick="importSpells()">导入</button>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="main-area">
            <!-- Tab栏 -->
            <div class="tab-bar">
                <div class="tab-item active" data-tab="edit" onclick="switchTab('edit')">编辑文本</div>
                <div class="tab-item" data-tab="color" onclick="switchTab('color')">色彩</div>
                <div class="tab-spacer"></div>
                <button class="btn btn-small btn-secondary" onclick="openSettingsModal()">设置</button>
            </div>

            <!-- 编辑Tab -->
            <div class="tab-content active" id="tabEdit">
                <div class="edit-layout">
                    <!-- 左侧：预览与操作 -->
                    <div class="edit-left">
                        <div class="form-item">
                            <label class="form-label">技能预览</label>
                            <div class="spell-preview" id="spellPreview">
                                <!-- 动态渲染 -->
                            </div>
                        </div>
                        <div class="form-item">
                            <label class="form-label">显示模式</label>
                            <div class="radio-group">
                                <button class="radio-btn active" data-mode="learn" onclick="setMode('learn')">学习</button>
                                <button class="radio-btn" data-mode="normal" onclick="setMode('normal')">普通</button>
                            </div>
                        </div>
                        <div class="form-item">
                            <label class="form-label">等级选择</label>
                            <div class="radio-group" id="levelSelector">
                                <!-- 动态生成 -->
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：编辑表单 -->
                    <div class="edit-right">
                        <div class="form-section">
                            <div class="form-title">基本信息</div>
                            <div class="form-row basic-info-row">
                                <div class="form-item">
                                    <label class="form-label">技能ID</label>
                                    <input type="text" class="form-input" id="spellId" placeholder="A000" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">名称</label>
                                    <input type="text" class="form-input" id="spellName" placeholder="技能名称" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">热键</label>
                                    <input type="text" class="form-input" id="spellHotKey" placeholder="Q" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">技能等级</label>
                                    <input type="number" class="form-input" id="spellLevel" min="1" max="10" value="1" oninput="onSpellLevelChange()">
                                </div>
                            </div>
                            <div class="form-row description-row">
                                <div class="form-item">
                                    <label class="form-label">技能描述</label>
                                    <textarea class="form-textarea" id="spellEffect" placeholder="例：向目标投掷一巨大的魔法锤，对其造成一定伤害并使其陷入眩晕。" oninput="onSpellDataChange()"></textarea>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">特点（可选）</label>
                                    <textarea class="form-textarea" id="spellNature" placeholder="例：需要持续施法" oninput="onSpellDataChange()"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">
                                技能描述
                                <span style="font-weight: normal; color: var(--text-placeholder); font-size: 11px; margin-left: 8px;">
                                    用{a}{b}标记数值位置
                                </span>
                            </div>
                            <div class="form-row description-row">
                                <div class="form-item">
                                    <label class="form-label">普通描述文本</label>
                                    <textarea class="form-textarea" id="normalWordText" placeholder="例：向目标投掷一巨大的魔法锤，对其造成{d}点伤害并使其{t}秒内处于眩晕状态。" onfocus="rememberDescriptionField(this)" oninput="onSpellDataChange()"></textarea>
                                </div>
                                <div class="form-item">
                                    <label class="form-label">升级描述文本</label>
                                    <textarea class="form-textarea" id="updateWordText" placeholder="例：{d}点伤害，{t}秒晕眩时间" onfocus="rememberDescriptionField(this)" oninput="onSpellDataChange()"></textarea>
                                </div>
                            </div>
                            <div class="form-item value-param-panel">
                                <div class="param-toolbar">
                                    <div class="param-hint">自动识别描述里的 {a}、{b}。默认用参数表编辑，公式输入保留给快速粘贴旧数据。</div>
                                    <button class="btn btn-small btn-secondary" type="button" onclick="addValueParamRule()">+ 参数</button>
                                    <button class="btn btn-small btn-secondary" id="toggleAdvancedParamsBtn" type="button" onclick="toggleAdvancedParams()">高级输入</button>
                                </div>
                                <div class="param-chips" id="paramChips"></div>
                                <div class="param-alerts" id="paramAlerts"></div>
                                <div class="param-table" id="valueParamTable"></div>
                                <div class="form-item advanced-params" id="advancedParamsPanel">
                                    <label class="form-label">公式输入</label>
                                    <input type="text" class="form-input" id="valueParams" placeholder="例：d=100+110；t=3+1" onchange="onValueParamsTextInput()">
                                    <span style="font-size: 11px; color: var(--text-placeholder); margin-top: 2px; display: block;">
                                        支持 参数=基础值+增量 或 参数=值1,值2,值3；旧版 [lv=3] 只用于读取兼容，不再控制技能等级。
                                    </span>
                                </div>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">技能属性</div>
                            <div class="property-list" id="propertyList">
                                <!-- 动态生成 -->
                            </div>
                            <button class="btn btn-small btn-secondary" style="margin-top: 8px;" onclick="addProperty()">+ 添加属性</button>
                        </div>
                    </div>
                </div>
                <!-- 底部操作栏 -->
                <div class="bottom-bar">
                    <div class="bottom-left">
                        <span id="currentPath" style="color: var(--text-placeholder);">未保存</span>
                    </div>
                    <div class="bottom-right">
                        <button class="btn btn-success" onclick="showGenerateModal()">生成</button>
                        <button class="btn btn-secondary" onclick="resetSpellData()">恢复默认</button>
                        <button class="btn btn-secondary" onclick="saveSpellAs()">另存为</button>
                        <button class="btn btn-primary" onclick="saveSpell()">保存</button>
                    </div>
                </div>
            </div>

            <!-- 色彩Tab -->
            <div class="tab-content" id="tabColor" style="flex-direction: column;">
                <div style="flex: 1; padding: 16px; overflow-y: auto;">
                    <div class="form-section">
                        <div class="form-title">颜色配置</div>
                        <div class="color-config-item">
                            <label>热键颜色</label>
                            <input type="color" class="color-picker" id="colorHotKey" onchange="onColorChange()">
                            <span class="color-value" id="colorHotKeyValue"></span>
                        </div>
                        <div class="color-config-item">
                            <label>学习等级颜色</label>
                            <input type="color" class="color-picker" id="colorLearnLevel" onchange="onColorChange()">
                            <span class="color-value" id="colorLearnLevelValue"></span>
                        </div>
                        <div class="color-config-item">
                            <label>属性名称颜色</label>
                            <input type="color" class="color-picker" id="colorProperty" onchange="onColorChange()">
                            <span class="color-value" id="colorPropertyValue"></span>
                        </div>
                        <div class="color-config-item">
                            <label>升级等级颜色</label>
                            <input type="color" class="color-picker" id="colorLearnUpdateLevel" onchange="onColorChange()">
                            <span class="color-value" id="colorLearnUpdateLevelValue"></span>
                        </div>
                        <div class="color-config-item">
                            <label>特殊描述颜色</label>
                            <input type="color" class="color-picker" id="colorNature" onchange="onColorChange()">
                            <span class="color-value" id="colorNatureValue"></span>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-title">示例预览</div>
                        <div class="spell-preview" id="colorExamplePreview" style="min-height: 150px;">
                            <!-- 动态渲染 -->
                        </div>
                    </div>
                </div>
                <div class="bottom-bar">
                    <div class="bottom-left">
                        <select class="form-input" id="colorConfigSelect" style="width: 150px;" onchange="loadSelectedColorConfig()">
                            <!-- 动态生成 -->
                        </select>
                    </div>
                    <div class="bottom-right">
                        <button class="btn btn-danger" onclick="deleteColorConfig()">删除方案</button>
                        <button class="btn btn-secondary" onclick="resetColorConfig()">恢复默认</button>
                        <button class="btn btn-primary" onclick="saveColorConfig()">保存方案</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 新建分类弹窗 -->
    <div class="modal-overlay" id="newCategoryModal">
        <div class="modal" style="max-width: 350px;">
            <div class="modal-header">新建分类</div>
            <div class="modal-body">
                <div class="form-item">
                    <label class="form-label">分类路径（如：英雄/圣骑士）</label>
                    <input type="text" class="form-input" id="newCategoryPath" placeholder="英雄/圣骑士">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('newCategoryModal')">取消</button>
                <button class="btn btn-primary" onclick="createCategory()">创建</button>
            </div>
        </div>
    </div>

    <!-- 生成结果弹窗 -->
    <div class="modal-overlay" id="generateModal">
        <div class="modal" style="max-width: 600px;">
            <div class="modal-header">生成结果 - 点击复制</div>
            <div class="modal-body">
                <div class="generate-result" id="generateResult">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="closeModal('generateModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 另存为弹窗 -->
    <div class="modal-overlay" id="saveAsModal">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">另存为</div>
            <div class="modal-body">
                <div class="form-item">
                    <label class="form-label">分类路径</label>
                    <input type="text" class="form-input" id="saveAsPath" placeholder="留空则保存到根目录">
                </div>
                <div class="form-item" style="margin-top: 12px;">
                    <label class="form-label">技能名称</label>
                    <input type="text" class="form-input" id="saveAsName" placeholder="技能名称">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('saveAsModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmSaveAs()">保存</button>
            </div>
        </div>
    </div>

    <!-- 保存颜色方案弹窗 -->
    <div class="modal-overlay" id="saveColorModal">
        <div class="modal" style="max-width: 300px;">
            <div class="modal-header">保存颜色方案</div>
            <div class="modal-body">
                <div class="form-item">
                    <label class="form-label">方案名称</label>
                    <input type="text" class="form-input" id="colorConfigName" placeholder="我的方案">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('saveColorModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmSaveColorConfig()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal" style="max-width: 560px;">
            <div class="modal-header">设置</div>
            <div class="modal-body">
                <div class="form-section" style="margin-bottom: 0;">
                    <div class="form-title">技能属性推荐值</div>
                    <div class="setting-list" id="spellProSuggestionList"></div>
                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <button class="btn btn-small btn-secondary" onclick="addSpellProSuggestion()">+ 添加</button>
                        <button class="btn btn-small btn-secondary" onclick="resetSpellProSuggestions()">恢复默认</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('settingsModal')">取消</button>
                <button class="btn btn-primary" onclick="saveSettings()">保存</button>
            </div>
        </div>
    </div>

    <div class="tree-context-menu" id="treeContextMenu"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================================
        // 状态管理
        // ============================================================================
        const state = {
            tree: [],
            currentSpell: null,
            currentPath: '',
            colorConfig: {},
            colorConfigs: [],
            currentColorName: 'default',
            mode: 'learn',
            level: 1,
            maxLevel: 1,
            valueParamRules: [],
            advancedParamsOpen: false,
            lastDescriptionField: 'normalWordText',
            settings: {}
        };

        const defaultSpellData = {
            id: 'A000',
            lv: 1,
            name: '',
            hotKey: '',
            effect: '',
            nature: '',
            pros: [{name: '法力消耗', val: ''}],
            updateWord: {text: '', vals: []},
            normalWord: {text: '', vals: []},
            valueParams: '',
            valueParamRules: []
        };

        const defaultColorConfig = {
            learnLevel: '#33ccff',
            property: '#33cc33',
            hotKey: '#ffcc00',
            learnUpdateLevel: '#ff9900',
            nature: '#ffcccc'
        };

        const defaultSpellProSuggestionList = [
            '法力消耗',
            '施法距离',
            '冷却时间',
            '持续时间',
            '法术范围',
            '吟唱时间'
        ];

        // ============================================================================
        // API调用
        // ============================================================================
        const API_METHOD_ALIASES = {
            wc3_get_initial_state: ['get_initial_state', 'get_initial_state_wc3', 'get_initial_state_v2'],
            wc3_get_spell_tree: ['get_spell_tree'],
            wc3_get_color_configs: ['get_color_configs'],
            wc3_get_settings: ['get_settings'],
            wc3_save_spell: ['save_spell'],
            wc3_load_spell: ['load_spell'],
            wc3_move_spell: ['move_spell'],
            wc3_create_category: ['create_category'],
            wc3_import_file: ['import_file'],
            wc3_clone_category: ['clone_category'],
            wc3_clone_spell: ['clone_spell'],
            wc3_rename_category: ['rename_category'],
            wc3_rename_spell: ['rename_spell'],
            wc3_delete_category: ['delete_category'],
            wc3_delete_spell: ['delete_spell'],
            wc3_export_category: ['export_category'],
            wc3_export_spell: ['export_spell'],
            wc3_save_color_config: ['save_color_config'],
            wc3_delete_color_config: ['delete_color_config'],
            wc3_save_settings: ['save_settings']
        };

        function toCamelCase(name) {
            return String(name || '').replace(/_([a-z])/g, (_, c) => c.toUpperCase());
        }

        function getApiMethodCandidates(method) {
            const aliases = API_METHOD_ALIASES[method] || [];
            const raw = [method, ...aliases].filter(Boolean);
            const candidates = [];
            raw.forEach(name => {
                candidates.push(name);
                candidates.push(toCamelCase(name));
            });
            return Array.from(new Set(candidates));
        }

        function hasApiMethod(api, method) {
            try {
                if (!api) return false;
                const val = api[method];
                return val !== undefined && val !== null;
            } catch (_) {
                return false;
            }
        }

        function resolveApiMethodName(method) {
            const api = window.pywebview?.api;
            if (!api) return null;
            const candidates = getApiMethodCandidates(method);
            for (const candidate of candidates) {
                if (hasApiMethod(api, candidate)) {
                    return candidate;
                }
            }
            return null;
        }

        async function waitForApiMethod(method, timeoutMs = 4000) {
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
                const resolved = resolveApiMethodName(method);
                if (resolved) {
                    return resolved;
                }
                await new Promise(r => setTimeout(r, 50));
            }
            return null;
        }

        async function waitForPywebviewApi(timeoutMs = 4000) {
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
                if (window.pywebview?.api) {
                    return true;
                }
                await new Promise(r => setTimeout(r, 50));
            }
            return false;
        }

        async function callApi(method, payload = {}) {
            if (!window.pywebview || !window.pywebview.api) {
                throw new Error('pywebview API unavailable');
            }
            let resolvedMethod = resolveApiMethodName(method);
            if (!resolvedMethod) {
                resolvedMethod = await waitForApiMethod(method, 4000);
            }
            if (!resolvedMethod) {
                throw new Error(`API method not found: ${method}`);
            }
            const apiMethod = window.pywebview.api[resolvedMethod];
            if (typeof apiMethod !== 'function') {
                throw new Error(`API method not callable: ${resolvedMethod}`);
            }
            return apiMethod(payload);
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast active ' + type;
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function escapeAttr(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeJsString(str) {
            return String(str || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function normalizePath(path) {
            return String(path || '').replace(/\\/g, '/');
        }

        function dedupeStringsKeepOrder(list) {
            const src = Array.isArray(list) ? list : [];
            const seen = new Set();
            const result = [];
            src.forEach(item => {
                const val = String(item || '').trim();
                if (!val || seen.has(val)) return;
                seen.add(val);
                result.push(val);
            });
            return result;
        }

        function getEmptyInitialStateData() {
            return {
                tree: [],
                colorConfigs: [],
                currentColorConfig: {...defaultColorConfig},
                currentColorName: 'default',
                settings: {
                    spellProSuggestions: [...defaultSpellProSuggestionList]
                },
                defaultSpellData: {...defaultSpellData}
            };
        }

        function normalizeInitialStateData(data) {
            const source = (data && typeof data === 'object') ? data : {};
            const normalized = getEmptyInitialStateData();

            normalized.tree = Array.isArray(source.tree) ? source.tree : [];
            normalized.colorConfigs = Array.isArray(source.colorConfigs) ? source.colorConfigs : [];
            normalized.currentColorConfig = source.currentColorConfig && typeof source.currentColorConfig === 'object'
                ? {...defaultColorConfig, ...source.currentColorConfig}
                : {...defaultColorConfig};
            normalized.currentColorName = typeof source.currentColorName === 'string' && source.currentColorName
                ? source.currentColorName
                : 'default';
            normalized.settings = source.settings && typeof source.settings === 'object'
                ? {...source.settings}
                : {};
            normalized.settings.spellProSuggestions = dedupeStringsKeepOrder(
                normalized.settings.spellProSuggestions || defaultSpellProSuggestionList
            );
            normalized.defaultSpellData = source.defaultSpellData && typeof source.defaultSpellData === 'object'
                ? {...defaultSpellData, ...source.defaultSpellData}
                : {...defaultSpellData};

            return normalized;
        }

        function applyInitialStateData(data) {
            const normalized = normalizeInitialStateData(data);
            state.tree = normalized.tree;
            state.colorConfigs = normalized.colorConfigs;
            state.colorConfig = normalized.currentColorConfig;
            state.currentColorName = normalized.currentColorName;
            state.settings = normalized.settings;

            renderTree();
            loadColorConfigToForm(state.colorConfig);
            renderColorConfigSelect();
            resetSpellData();

            const rawLevel = parseInt(normalized.defaultSpellData?.level ?? normalized.defaultSpellData?.lv ?? 1) || 1;
            const level = Math.min(Math.max(rawLevel, 1), 10);
            document.getElementById('spellLevel').value = level;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            });
        }

        // WC3颜色代码生成
        function dyeing(str, color) {
            if (!color) return str;
            return '|cff' + color.replace('#', '') + str + '|r';
        }

        // 字符串模板填充
        String.prototype.format = function(obj) {
            let str = this;
            if (!obj || typeof obj !== 'object') return str;
            for (const key in obj) {
                const regex = new RegExp('\\{' + key + '\\}', 'g');
                str = str.replace(regex, obj[key]);
            }
            return str;
        };

        // 数值参数解析（兼容旧格式 [lv=3][a=5+10]；lv 仅用于历史读取，不再控制技能等级）
        function parseValueParams(str) {
            if (!str || typeof str !== 'string') return {legacyLv: null, params: {}};

            const raw = String(str).trim();
            if (!raw) return {legacyLv: null, params: {}};

            if (raw.includes('[') && raw.includes(']')) {
                return parseOldBracketFormat(raw);
            }
            return parseSemicolonFormat(raw);
        }

        function parseOldBracketFormat(str) {
            let legacyLv = null;
            const params = {};

            const lvMatch = str.match(/\[lv\s*=\s*(\d+)\]/i);
            if (lvMatch) {
                legacyLv = Math.max(parseInt(lvMatch[1]) || 1, 1);
            }

            const regex = /\[([a-zA-Z]+)\s*=\s*([^\]]+)\]/g;
            let match;
            while ((match = regex.exec(str)) !== null) {
                const key = match[1].trim().toLowerCase();
                const value = match[2].trim();
                if (!key || key === 'lv' || !value) continue;
                params[key] = value;
            }

            return {legacyLv, params};
        }

        function parseSemicolonFormat(str) {
            const params = {};

            const parts = str.split(/[;；]/);
            parts.forEach(part => {
                const item = String(part || '').trim();
                if (!item) return;
                const eqIdx = item.indexOf('=');
                if (eqIdx <= 0) return;

                const key = item.slice(0, eqIdx).trim().toLowerCase();
                const value = item.slice(eqIdx + 1).trim();
                if (!key || !value) return;

                if (key === 'lv') return;
                params[key] = value;
            });

            return {legacyLv: null, params};
        }

        function generateValues(lv, params) {
            const total = Math.max(parseInt(lv) || 1, 1);
            const result = [];
            for (let i = 0; i < total; i++) {
                const obj = {};
                Object.keys(params || {}).forEach(key => {
                    const val = String(params[key] || '').trim();
                    if (!val) return;
                    if (val.includes('+')) {
                        const [baseRaw, plusRaw] = val.split('+');
                        const base = parseFloat((baseRaw || '').trim());
                        const plus = parseFloat((plusRaw || '').trim());
                        if (!Number.isNaN(base) && !Number.isNaN(plus)) {
                            obj[key] = base + plus * i;
                            return;
                        }
                    }
                    if (val.includes(',')) {
                        const vals = val.split(',').map(v => String(v || '').trim());
                        obj[key] = vals[i] !== undefined ? vals[i] : (vals[vals.length - 1] || '');
                        return;
                    }
                    obj[key] = val;
                });
                result.push(obj);
            }
            return result;
        }

        function paramsToSaveFormat(params) {
            const parts = [];
            Object.keys(params || {}).forEach(key => {
                const val = String(params[key] || '').trim();
                if (!key || !val) return;
                parts.push(`${key}=${val}`);
            });
            return parts.join('；');
        }

        function normalizeParamKey(key) {
            return String(key || '').trim().replace(/[{}]/g, '').toLowerCase();
        }

        function extractPlaceholdersFromText(...texts) {
            const result = [];
            const seen = new Set();
            texts.forEach(text => {
                const raw = String(text || '');
                const regex = /\{([a-zA-Z][a-zA-Z0-9_]*)\}/g;
                let match;
                while ((match = regex.exec(raw)) !== null) {
                    const key = normalizeParamKey(match[1]);
                    if (!key || seen.has(key)) continue;
                    seen.add(key);
                    result.push(key);
                }
            });
            return result;
        }

        function cleanValueParamRule(rule) {
            const key = normalizeParamKey(rule?.key);
            if (!key) return null;
            const type = ['fixed', 'linear', 'list'].includes(rule?.type) ? rule.type : 'linear';
            return {
                key,
                label: String(rule?.label || ''),
                type,
                value: String(rule?.value ?? ''),
                base: String(rule?.base ?? ''),
                step: String(rule?.step ?? ''),
                values: String(rule?.values ?? '')
            };
        }

        function normalizeValueParamRules(rules) {
            const src = Array.isArray(rules) ? rules : [];
            const seen = new Set();
            const result = [];
            src.forEach(rule => {
                const cleaned = cleanValueParamRule(rule);
                if (!cleaned || seen.has(cleaned.key)) return;
                seen.add(cleaned.key);
                result.push(cleaned);
            });
            return result;
        }

        function inferRuleFromParamValue(key, value, existingRule = null) {
            const raw = String(value || '').trim();
            const rule = cleanValueParamRule(existingRule) || {
                key,
                label: '',
                type: 'linear',
                value: '',
                base: '',
                step: '',
                values: ''
            };
            rule.key = normalizeParamKey(key);

            if (raw.includes('+')) {
                const plusIndex = raw.indexOf('+');
                rule.type = 'linear';
                rule.base = raw.slice(0, plusIndex).trim();
                rule.step = raw.slice(plusIndex + 1).trim();
                return rule;
            }
            if (raw.includes(',')) {
                rule.type = 'list';
                rule.values = raw;
                return rule;
            }
            rule.type = 'fixed';
            rule.value = raw;
            return rule;
        }

        function valueParamRulesFromParams(params, existingRules = []) {
            const existingMap = new Map(normalizeValueParamRules(existingRules).map(rule => [rule.key, rule]));
            return Object.keys(params || {}).map(key => {
                const normalizedKey = normalizeParamKey(key);
                return inferRuleFromParamValue(normalizedKey, params[key], existingMap.get(normalizedKey));
            }).filter(Boolean);
        }

        function getRuleFormulaValue(rule) {
            const cleaned = cleanValueParamRule(rule);
            if (!cleaned) return '';
            if (cleaned.type === 'fixed') {
                return cleaned.value.trim();
            }
            if (cleaned.type === 'list') {
                return cleaned.values.trim();
            }
            const base = cleaned.base.trim();
            const step = cleaned.step.trim();
            if (!base && !step) return '';
            if (base && step) return `${base}+${step}`;
            return base || step;
        }

        function valueParamRulesToParams(rules) {
            const params = {};
            normalizeValueParamRules(rules).forEach(rule => {
                const formula = getRuleFormulaValue(rule);
                if (!formula) return;
                params[rule.key] = formula;
            });
            return params;
        }

        function syncValueParamRulesWithPlaceholders(rules, placeholders) {
            const normalizedRules = normalizeValueParamRules(rules);
            const placeholderSet = new Set(placeholders || []);
            const byKey = new Map(normalizedRules.map(rule => [rule.key, rule]));
            const ordered = [];

            (placeholders || []).forEach(key => {
                if (byKey.has(key)) {
                    ordered.push(byKey.get(key));
                } else {
                    ordered.push({key, label: '', type: 'linear', value: '', base: '', step: '', values: ''});
                }
            });

            normalizedRules.forEach(rule => {
                if (!placeholderSet.has(rule.key)) {
                    ordered.push(rule);
                }
            });

            return ordered;
        }

        function formatValueNumber(num) {
            if (!Number.isFinite(num)) return '';
            const rounded = Math.round(num * 1000000) / 1000000;
            return Number.isInteger(rounded) ? rounded : parseFloat(rounded.toFixed(6));
        }

        function evaluateValueParamRule(rule, index) {
            const cleaned = cleanValueParamRule(rule);
            if (!cleaned) return '';

            if (cleaned.type === 'fixed') {
                return cleaned.value.trim();
            }

            if (cleaned.type === 'list') {
                const vals = cleaned.values.split(',').map(v => String(v || '').trim()).filter(v => v !== '');
                if (vals.length === 0) return '';
                return vals[index] !== undefined ? vals[index] : vals[vals.length - 1];
            }

            const base = parseFloat(cleaned.base);
            const step = parseFloat(cleaned.step);
            if (Number.isNaN(base) || Number.isNaN(step)) return '';
            return formatValueNumber(base + step * index);
        }

        function generateValuesFromRules(lv, rules) {
            const total = Math.max(parseInt(lv) || 1, 1);
            const normalizedRules = normalizeValueParamRules(rules);
            const result = [];
            for (let i = 0; i < total; i++) {
                const obj = {};
                normalizedRules.forEach(rule => {
                    const value = evaluateValueParamRule(rule, i);
                    if (value === '') return;
                    obj[rule.key] = value;
                });
                result.push(obj);
            }
            return result;
        }

        function getValueParamPreview(rule, lv) {
            const total = Math.min(Math.max(parseInt(lv) || 1, 1), 10);
            const values = [];
            for (let i = 0; i < total; i++) {
                values.push(evaluateValueParamRule(rule, i));
            }
            return values;
        }

        function validateValueParamRules(rules, placeholders, lv) {
            const normalizedRules = normalizeValueParamRules(rules);
            const paramMap = new Map(normalizedRules.map(rule => [rule.key, rule]));
            const placeholderSet = new Set(placeholders || []);
            const alerts = [];

            (placeholders || []).forEach(key => {
                const rule = paramMap.get(key);
                if (!rule || !getRuleFormulaValue(rule)) {
                    alerts.push({type: 'error', text: `{${key}} 还没有数值`});
                }
            });

            normalizedRules.forEach(rule => {
                if (!placeholderSet.has(rule.key)) {
                    alerts.push({type: 'warning', text: `{${rule.key}} 未在描述中使用`});
                }
                if (rule.type === 'linear' && (Number.isNaN(parseFloat(rule.base)) || Number.isNaN(parseFloat(rule.step)))) {
                    alerts.push({type: 'error', text: `{${rule.key}} 的递增数值不完整`});
                }
                if (rule.type === 'list') {
                    const vals = rule.values.split(',').map(v => String(v || '').trim()).filter(v => v !== '');
                    if (vals.length === 0) {
                        alerts.push({type: 'error', text: `{${rule.key}} 的逐级值为空`});
                    } else if (vals.length < lv) {
                        alerts.push({type: 'warning', text: `{${rule.key}} 少于 ${lv} 级，将沿用最后一个值`});
                    }
                }
            });

            return alerts;
        }

        function getNextParamKey() {
            const used = new Set(normalizeValueParamRules(state.valueParamRules).map(rule => rule.key));
            const letters = 'abcdefghijklmnopqrstuvwxyz'.split('');
            return letters.find(letter => !used.has(letter)) || `p${used.size + 1}`;
        }

        function ensureValueParamRulesForCurrentForm() {
            const normalText = document.getElementById('normalWordText')?.value || '';
            const updateText = document.getElementById('updateWordText')?.value || '';
            const placeholders = extractPlaceholdersFromText(normalText, updateText);
            state.valueParamRules = syncValueParamRulesWithPlaceholders(state.valueParamRules, placeholders);
            return placeholders;
        }

        // ============================================================================
        // 树形结构渲染
        // ============================================================================
        function renderTree() {
            const container = document.getElementById('treeContainer');
            const rootDrop = `
                <div class="root-drop-target"
                     ondragover="onRootDragOver(event)"
                     ondragleave="onRootDragLeave(event)"
                     ondrop="onRootDrop(event)">
                    拖到这里移动到根目录
                </div>
            `;
            container.innerHTML = rootDrop + renderTreeItems(state.tree);
        }

        function renderTreeItems(items, depth = 0) {
            if (!items || items.length === 0) return '';
            return items.map(item => {
                if (item.type === 'category') {
                    const hasChildren = item.children && item.children.length > 0;
                    const expandIcon = item.expanded ? '▼' : '▶';
                    const itemPath = normalizePath(item.path || '');
                    const safePath = escapeJsString(itemPath);
                    return `
                        <div class="tree-item">
                            <div class="tree-row"
                                 onclick="toggleCategory('${safePath}')"
                                 oncontextmenu="showTreeContextMenu(event, 'category', '${safePath}')"
                                 ondragover="onCategoryDragOver(event)"
                                 ondragleave="onCategoryDragLeave(event)"
                                 ondrop="onCategoryDrop(event, '${safePath}')"
                                 data-drop-path="${escapeAttr(itemPath)}">
                                ${hasChildren ? `<span class="tree-expand">${expandIcon}</span>` : '<span class="tree-expand"></span>'}
                                <span class="tree-icon">📁</span>
                                <span class="tree-name">${item.name}</span>
                            </div>
                            <div class="tree-children ${item.expanded ? '' : 'collapsed'}">
                                <div class="tree-children-inner">${renderTreeItems(item.children, depth + 1)}</div>
                            </div>
                        </div>
                    `;
                } else {
                    const itemPath = normalizePath(item.path || '');
                    const safePath = escapeJsString(itemPath);
                    return `
                        <div class="tree-item">
                            <div class="tree-row ${normalizePath(state.currentPath) === itemPath ? 'selected' : ''}"
                                 onclick="selectSpell('${safePath}')"
                                 oncontextmenu="showTreeContextMenu(event, 'spell', '${safePath}')"
                                 draggable="true"
                                 ondragstart="onSpellDragStart(event, '${safePath}')"
                                 ondragend="onSpellDragEnd(event)">
                                <span class="tree-expand"></span>
                                <span class="tree-icon">📄</span>
                                <span class="tree-name">${item.name}</span>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function toggleCategory(path) {
            const targetPath = normalizePath(path);
            function toggle(items) {
                for (const item of items) {
                    if (normalizePath(item.path) === targetPath && item.type === 'category') {
