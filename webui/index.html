                        item.expanded = !item.expanded;
                        return true;
                    }
                    if (item.children && toggle(item.children)) return true;
                }
                return false;
            }
            toggle(state.tree);
            renderTree();
        }

        const dragState = {
            expandTimers: {}
        };

        function clearAllExpandTimers() {
            Object.keys(dragState.expandTimers).forEach(key => {
                clearTimeout(dragState.expandTimers[key]);
                delete dragState.expandTimers[key];
            });
        }

        function onSpellDragStart(event, spellPath) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', normalizePath(spellPath));
            event.currentTarget.classList.add('dragging');
        }

        function onSpellDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.tree-row.drag-over').forEach(el => el.classList.remove('drag-over'));
            clearAllExpandTimers();
        }

        function onCategoryDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const row = event.currentTarget;
            row.classList.add('drag-over');

            const categoryPath = normalizePath(row.dataset.dropPath || '');
            if (!categoryPath) return;

            if (!dragState.expandTimers[categoryPath]) {
                dragState.expandTimers[categoryPath] = setTimeout(() => {
                    delete dragState.expandTimers[categoryPath];
                    expandCategoryIfCollapsed(categoryPath);
                }, 450);
            }
        }

        function onCategoryDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
            const categoryPath = normalizePath(event.currentTarget.dataset.dropPath || '');
            if (categoryPath && dragState.expandTimers[categoryPath]) {
                clearTimeout(dragState.expandTimers[categoryPath]);
                delete dragState.expandTimers[categoryPath];
            }
        }

        function expandCategoryIfCollapsed(path) {
            let changed = false;
            function walk(items) {
                for (const item of items || []) {
                    if (item.type === 'category' && normalizePath(item.path) === path) {
                        if (!item.expanded) {
                            item.expanded = true;
                            changed = true;
                        }
                        return true;
                    }
                    if (item.children && walk(item.children)) return true;
                }
                return false;
            }
            walk(state.tree);
            if (changed) {
                renderTree();
            }
        }

            const left = Math.max(margin, Math.min(x, maxLeft));
            const top = Math.max(margin, Math.min(y, maxTop));
            menu.style.left = `${left}px`;
            menu.style.top = `${top}px`;

        function reverseEngineerParamsFromVals(vals) {
            if (!Array.isArray(vals) || vals.length === 0) return '';
            const keys = Object.keys(vals[0] || {});
            if (keys.length === 0) return '';

            const params = {};
            keys.forEach(key => {
                const series = vals.map(v => v?.[key]);
                if (series.length < 2) {
                    params[key] = String(series[0] ?? '');
                    return;
                }
                const nums = series.map(v => Number(v));
                const allNum = nums.every(v => !Number.isNaN(v));
                if (allNum) {
                    const diff = nums[1] - nums[0];
                    const isArithmetic = nums.every((v, i) => i < 2 || v - nums[i - 1] === diff);
                    if (isArithmetic && diff !== 0) {
                        params[key] = `${nums[0]}+${diff}`;
                        return;
                    }
                }
                params[key] = series.map(v => String(v ?? '')).join(',');
            });

            return paramsToSaveFormat(params);
        }

        function migrateData(data) {
            const migrated = {...defaultSpellData, ...(data || {})};
            migrated.level = parseInt(migrated.level ?? migrated.lv ?? 1) || 1;
            migrated.lv = migrated.level;

            if (!Array.isArray(migrated.pros)) {
                migrated.pros = [{name: '法力消耗', val: ''}];
            }
            if (!migrated.updateWord || typeof migrated.updateWord !== 'object') {
                migrated.updateWord = {text: '', vals: []};
            }
            if (!migrated.normalWord || typeof migrated.normalWord !== 'object') {
                migrated.normalWord = {text: '', vals: []};
            }
            if (!Array.isArray(migrated.valueParamRules)) {
                migrated.valueParamRules = [];
            }

            let valueParams = String(migrated.valueParams || '').trim();
            if (!valueParams) {
                const oldUpdate = String(migrated.updateWordVals || '').trim();
                const oldNormal = String(migrated.normalWordVals || '').trim();
                valueParams = oldUpdate || oldNormal;
            }
            if (!valueParams) {
                valueParams = reverseEngineerParamsFromVals(migrated.updateWord.vals) ||
                    reverseEngineerParamsFromVals(migrated.normalWord.vals) ||
                    '';
            }

            const parsed = parseValueParams(valueParams);
            migrated.valueParams = paramsToSaveFormat(parsed.params);
            const fromValueParams = valueParamRulesFromParams(parsed.params, migrated.valueParamRules);
            migrated.valueParamRules = normalizeValueParamRules(migrated.valueParamRules);
            if (fromValueParams.length > 0) {
                const savedMap = new Map(migrated.valueParamRules.map(rule => [rule.key, rule]));
                migrated.valueParamRules = fromValueParams.map(rule => ({
                    ...rule,
                    label: savedMap.get(rule.key)?.label || rule.label || ''
                }));
            }
            return migrated;
        }

        function renderValueParamEditor() {
            const chipsEl = document.getElementById('paramChips');

                ? placeholders.map(key => `<button class="param-chip" type="button" onclick="insertParamPlaceholder('${escapeJsString(key)}')">{${key}}</button>`).join('')

            const alerts = validateValueParamRules(rules, placeholders, level);
            alertsEl.innerHTML = alerts.map(alert => (
                `<span class="param-alert ${alert.type}">${escapeHtml(alert.text)}</span>`
            )).join('');

                tableEl.innerHTML = '<div class="param-empty">在描述里输入 {a}，这里会自动出现参数行。也可以先手动添加一个参数。</div>';
            } else {

        function refreshValueParamFeedback() {
            const alertsEl = document.getElementById('paramAlerts');
            const tableEl = document.getElementById('valueParamTable');
            if (!alertsEl) return;

            const normalText = document.getElementById('normalWordText')?.value || '';
            const updateText = document.getElementById('updateWordText')?.value || '';
            const placeholders = extractPlaceholdersFromText(normalText, updateText);
            const level = Math.max(parseInt(document.getElementById('spellLevel')?.value) || 1, 1);
            const rules = normalizeValueParamRules(state.valueParamRules);

            const alerts = validateValueParamRules(rules, placeholders, level);
            alertsEl.innerHTML = alerts.map(alert => (
                `<span class="param-alert ${alert.type}">${escapeHtml(alert.text)}</span>`
            )).join('');

            if (!tableEl) return;
            rules.forEach((rule, index) => {
                const row = tableEl.querySelector(`[data-param-index="${index}"] .param-preview`);
                if (!row) return;
                row.innerHTML = getValueParamPreview(rule, level).map((value, i) => (
                    `<span class="param-preview-pill">${i + 1}级 ${escapeHtml(value || '-')}</span>`
                )).join('');
            });
        }

        function renderValueParamRow(rule, index, level) {
            const preview = getValueParamPreview(rule, level).map((value, i) => (
                `<span class="param-preview-pill">${i + 1}级 ${escapeHtml(value || '-')}</span>`
            )).join('');
            const type = rule.type || 'linear';
            const mainInput = type === 'fixed'
                ? `<input type="text" class="form-input" value="${escapeAttr(rule.value)}" placeholder="固定值" oninput="updateValueParamRule(${index}, 'value', this.value)">`
                : type === 'list'
                    ? `<input type="text" class="form-input" value="${escapeAttr(rule.values)}" placeholder="10,15,20" oninput="updateValueParamRule(${index}, 'values', this.value)">`
                    : `<input type="text" class="form-input" value="${escapeAttr(rule.base)}" placeholder="基础值" oninput="updateValueParamRule(${index}, 'base', this.value)">`;
            const secondInput = type === 'linear'
                ? `<input type="text" class="form-input" value="${escapeAttr(rule.step)}" placeholder="每级+" oninput="updateValueParamRule(${index}, 'step', this.value)">`
                : '<span class="param-hint">按等级预览见下方</span>';

            return `
                <div class="param-row" data-param-index="${index}">
                    <button class="param-key" type="button" onclick="insertParamPlaceholder('${escapeJsString(rule.key)}')">{${escapeHtml(rule.key)}}</button>
                    <input type="text" class="form-input" value="${escapeAttr(rule.label)}" placeholder="名称/备注" oninput="updateValueParamRule(${index}, 'label', this.value)">
                    <select class="param-type-select" onchange="updateValueParamRule(${index}, 'type', this.value)">
                        <option value="linear" ${type === 'linear' ? 'selected' : ''}>每级递增</option>
                        <option value="fixed" ${type === 'fixed' ? 'selected' : ''}>固定值</option>
                        <option value="list" ${type === 'list' ? 'selected' : ''}>逐级填写</option>
                    </select>
                    ${mainInput}
                    ${secondInput}
                    <button class="property-remove" type="button" onclick="removeValueParamRule(${index})">×</button>
                    <div class="param-preview">${preview}</div>
                </div>
            `;
        }

        function updateValueParamRule(index, field, value) {
            const rules = normalizeValueParamRules(state.valueParamRules);
            if (!rules[index]) return;
            if (field === 'type') {
                rules[index].type = value;
            } else if (field === 'key') {
                rules[index].key = normalizeParamKey(value);
            } else {
                rules[index][field] = value;
            }
            state.valueParamRules = rules;
            syncValueParamTextFromRules();
            onSpellDataChange({renderParams: field === 'type' || field === 'key'});
        }

        function removeValueParamRule(index) {
            const rules = normalizeValueParamRules(state.valueParamRules);
            if (!rules[index]) return;
            rules.splice(index, 1);
            state.valueParamRules = rules;
            syncValueParamTextFromRules();
            onSpellDataChange();
        }

        function addValueParamRule() {
            const rules = normalizeValueParamRules(state.valueParamRules);
            rules.push({key: getNextParamKey(), label: '', type: 'linear', value: '', base: '', step: '', values: ''});
            state.valueParamRules = rules;
            syncValueParamTextFromRules();
            onSpellDataChange();
        }

        function insertParamPlaceholder(key) {
            const input = document.activeElement && ['normalWordText', 'updateWordText'].includes(document.activeElement.id)
                ? document.activeElement
                : document.getElementById(state.lastDescriptionField) || document.getElementById('normalWordText');
            if (!input) return;
            const token = `{${key}}`;
            const start = input.selectionStart ?? input.value.length;
            const end = input.selectionEnd ?? input.value.length;
            input.value = input.value.slice(0, start) + token + input.value.slice(end);
            input.focus();
            input.selectionStart = input.selectionEnd = start + token.length;
            onSpellDataChange();
        }

        function showPropertySuggestions(index, keyword = null) {
            const listEl = document.getElementById(`propertySuggestList_${index}`);
            const allItems = document.querySelectorAll('.property-item');
            const row = allItems[index];
            if (!listEl || !row) return;
            const input = row.querySelector('.property-name-input');
            if (!input) return;

            const query = (keyword === null ? input.value : keyword).trim().toLowerCase();
            const candidates = getSpellProSuggestions().filter(name => {
                if (!query) return true;
                return name.toLowerCase().includes(query);
            });

            if (candidates.length === 0) {
                listEl.classList.remove('active');
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = candidates.map(name => (
                `<div class="property-suggest-item" onmousedown="selectPropertySuggestion(${index}, '${escapeJsString(name)}')">${escapeHtml(name)}</div>`
            )).join('');

            // 计算fixed定位的下拉菜单位置
            const inputRect = input.getBoundingClientRect();
            listEl.style.left = inputRect.left + 'px';
            listEl.style.top = (inputRect.bottom + 4) + 'px';
            listEl.style.width = Math.max(inputRect.width, 160) + 'px';
            listEl.classList.add('active');
        }

        function selectPropertySuggestion(index, name) {
            const allItems = document.querySelectorAll('.property-item');
            const row = allItems[index];
            if (!row) return;
            const input = row.querySelector('.property-name-input');
            const listEl = document.getElementById(`propertySuggestList_${index}`);
            if (input) {

            if (listEl) {

        // ============================================================================
        // 技能预览渲染
        // ============================================================================
        function renderSpellPreview() {
            const preview = document.getElementById('spellPreview');
            const spell = state.currentSpell;
            if (!spell) {
                preview.innerHTML = '<p>请输入技能信息</p>';
                return;
            }

            const colors = state.colorConfig;
            const lv = state.level;
            const mode = state.mode;
            const totalLevel = Math.max(parseInt(spell.level ?? spell.lv ?? 1) || 1, 1);
            const vals = Array.isArray(spell.normalWord?.vals) && spell.normalWord.vals.length > 0
                ? spell.normalWord.vals
                : generateValuesFromRules(totalLevel, spell.valueParamRules || state.valueParamRules);

            let html = '';
            if (mode === 'learn') {
                // 学习模式
                html = `<p>学习 <span style="color:${colors.learnLevel}">${lv}级</span> ${spell.name || '技能名称'}`;
                if (spell.hotKey) {
                    html += ` (<span style="color:${colors.hotKey}">${spell.hotKey}</span>)`;
                }
                html += '</p><hr>';

                html += `<p>${spell.effect || ''}`;
                if (spell.nature) {
                    html += `<br><br><span style="color:${colors.nature}">${spell.nature}</span>`;
                }
                html += '<br><br>';

                // 属性
                spell.pros?.forEach(p => {
                    if (p.name && p.val) {
                        html += `<span style="color:${colors.property}">${p.name}：</span>${p.val}<br>`;
                    }
                });

                // 升级描述
                if (spell.updateWord?.text && vals.length > 0) {
                    vals.forEach((v, i) => {
                        let text = spell.updateWord.text.format(v);
                        if (!text.endsWith('。')) text += '。';
                        html += `<br><span style="color:${colors.learnUpdateLevel}">${i + 1}级</span> - ${text}`;
                    });
                }
                html += '</p>';
            } else {
                // 普通模式
                html = `<p>${spell.name || '技能名称'}`;
                if (spell.hotKey) {
                    html += ` (<span style="color:${colors.hotKey}">${spell.hotKey}</span>)`;
                }
                html += ` - [<span style="color:${colors.learnLevel}">${lv}级</span>]</p><hr>`;

                let normalText = spell.normalWord?.text || '';
                if (normalText && vals[lv - 1]) {
                    normalText = normalText.format(vals[lv - 1]);
                }
                if (!normalText.endsWith('。') && normalText) normalText += '。';
                html += `<p>${normalText}`;

                if (spell.nature) {
                    html += `<br><br><span style="color:${colors.nature}">${spell.nature}</span>`;
                }

                // 属性（排除法力消耗）
                const pros = spell.pros?.filter(p => p.name !== '法力消耗') || [];
                if (pros.length > 0) {
                    html += '<br><br>';
                    pros.forEach(p => {
                        if (p.name && p.val) {
                            html += `<span style="color:${colors.property}">${p.name}：</span>${p.val}<br>`;
                        }
                    });
                }
                html += '</p>';
            }

            preview.innerHTML = html;
        }

        // ============================================================================
        // 生成功能
        // ============================================================================
        function showGenerateModal() {
            const spell = state.currentSpell;
            if (!spell || !spell.name) {
                showToast('请先填写技能信息', 'error');
                return;
            }

            const colors = state.colorConfig;
            const result = document.getElementById('generateResult');
            let html = '';
            const totalLevel = Math.max(parseInt(spell.level ?? spell.lv ?? 1) || 1, 1);
            const vals = Array.isArray(spell.normalWord?.vals) && spell.normalWord.vals.length > 0
                ? spell.normalWord.vals
                : generateValuesFromRules(totalLevel, spell.valueParamRules || state.valueParamRules);

            // 学习标题
            let learnTitle = `学习 ${dyeing('%d 级', colors.learnLevel)} ${spell.name}`;
            if (spell.hotKey) {
                learnTitle += `(${dyeing(spell.hotKey, colors.hotKey)})`;
            }
            html += createGenerateItem('学习标题', learnTitle);

            // 学习扩展
            let learnExport = spell.effect + '\n';
            if (spell.nature) learnExport += spell.nature + '\n';
            spell.pros?.forEach(p => {
                if (p.name && p.val) {
                    learnExport += `\n${dyeing(p.name, colors.property)}：${p.val}`;
                }
            });
            if (spell.updateWord?.text && vals.length > 0) {
                learnExport += '\n';
                vals.forEach((v, i) => {
                    let text = spell.updateWord.text.format(v);
                    if (!text.endsWith('。')) text += '。';
                    learnExport += `\n${dyeing((i + 1) + '级', colors.learnUpdateLevel)} - ${text}`;
                });
            }
            html += createGenerateItem('学习扩展', learnExport);

            // 各等级
            const maxLv = Math.max(vals.length, 1);
            for (let lv = 1; lv <= maxLv; lv++) {
                // 标题
                let title = `${spell.name}`;
                if (spell.hotKey) {
                    title += `(${dyeing(spell.hotKey, colors.hotKey)})`;
                }
                title += ` - [${dyeing(lv + ' 级', colors.learnLevel)}]`;
                html += createGenerateItem(`${lv}级标题`, title);

                // 扩展
                let normalText = spell.normalWord?.text || '';
                if (normalText && vals[lv - 1]) {
                    normalText = normalText.format(vals[lv - 1]);
                }
                if (!normalText.endsWith('。') && normalText) normalText += '。';

                let exportText = normalText;
                if (spell.nature) exportText += '\n' + spell.nature;

                const pros = spell.pros?.filter(p => p.name !== '法力消耗') || [];
                if (pros.length > 0) {
                    exportText += '\n';
                    pros.forEach(p => {
                        if (p.name && p.val) {
                            exportText += `\n${dyeing(p.name, colors.property)}：${p.val}`;
                        }
                    });
                }
                html += createGenerateItem(`${lv}级扩展`, exportText);
            }

            result.innerHTML = html;
            openModal('generateModal');
        }

        function createGenerateItem(label, content) {
            return `
                <div class="generate-item">
                    <span class="label">${label}</span>
                    <span class="content">${escapeHtml(content)}</span>
                    <button class="btn btn-small btn-primary" onclick="copyToClipboard(\`${escapeBacktick(content)}\`)">复制</button>
                </div>
            `;
        }

        function escapeHtml(str) {
            return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeBacktick(str) {
            return str.replace(/`/g, '\\`').replace(/\n/g, '\\n');
        }

            try {
                const path = state.currentPath;
                const parts = path.split('/');
                const categoryPath = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
                const filename = parts.length > 0 ? parts[parts.length - 1].replace('.json', '') : spell.name;

                const result = await callApi('wc3_save_spell', {
                    path: categoryPath,
                    filename: filename || spell.name,
                    data: spell

                if (result.success) {
                    showToast('保存成功', 'success');
                    state.currentPath = normalizePath(result.data?.path || path);
                    document.getElementById('currentPath').textContent = state.currentPath;
                    await refreshTree();

                    showToast(result.message || '保存失败', 'error');
                }

            }

        async function bootstrap() {
            try {
                // 等待API就绪

                if (!ready) {
                    throw new Error('pywebview API unavailable');
                }

                // 获取初始状态
                const result = await callApi('wc3_get_initial_state');
                if (!result || !result.success) {
                    throw new Error(result?.message || 'Initialization API returned failure');
                }
                applyInitialStateData(result.data);
            } catch (e) {
                console.error('初始化失败:', e);
                if (e?.message && (e.message.includes('API method not found') || e.message.includes('pywebview API unavailable'))) {
                    console.warn('[WC3] API not available, using fallback initial state.', e.message);
                    applyInitialStateData(getEmptyInitialStateData());
                    return;
                }
                showToast('初始化失败: ' + e.message, 'error');
            }
        }

        // 监听pywebview就绪
        window.addEventListener('pywebviewready', bootstrap);
        setTimeout(() => {
            if (window.pywebview?.api) bootstrap();
        }, 100);
    </script>
</body>
</html>
