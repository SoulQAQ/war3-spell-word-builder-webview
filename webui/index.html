<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WC3技能文本生成器</title>
    <style>
        /* CSS变量定义 */
        :root {
            --primary-color: #4a90d9;
            --primary-hover: #357abd;
            --danger-color: #e74c3c;
            --danger-hover: #c0392b;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --border-color: #dcdfe6;
            --text-primary: #303133;
            --text-secondary: #606266;
            --text-placeholder: #c0c4cc;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --radius: 4px;
            --transition: all 0.2s ease;
            --sidebar-width: 200px;
        }

        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            font-size: 13px;
            color: var(--text-primary);
            background: var(--bg-color);
            height: 100vh;
            overflow: hidden;
        }

        /* 主布局 */
        .app-layout {
            display: flex;
            height: 100vh;
        }

        /* 左侧边栏 - 资源树 */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .sidebar-footer {
            padding: 8px 12px;
            border-top: 1px solid var(--border-color);
        }

        .root-drop-target {
            margin-bottom: 8px;
            border: 1px dashed var(--border-color);
            color: var(--text-secondary);
            border-radius: var(--radius);
            text-align: center;
            padding: 6px 8px;
            font-size: 12px;
            transition: var(--transition);
        }

        .root-drop-target.drag-over {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: rgba(74, 144, 217, 0.08);
        }

        /* 树形结构 */
        .tree-item {
            cursor: pointer;
            user-select: none;
        }

        .tree-row {
            display: flex;
            align-items: center;
            padding: 5px 12px;
            transition: var(--transition);
        }

        .tree-row:hover {
            background: #f0f2f5;
        }

        .tree-row.selected {
            background: rgba(74, 144, 217, 0.1);
            color: var(--primary-color);
        }

        .tree-row.drag-over {
            background: rgba(74, 144, 217, 0.15);
            outline: 1px dashed var(--primary-color);
        }

        .tree-row.dragging {
            opacity: 0.6;
        }

        .tree-icon {
            width: 16px;
            height: 16px;
            margin-right: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            color: var(--text-placeholder);
        }

        .tree-expand {
            width: 16px;
            height: 16px;
            margin-right: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .tree-expand:hover {
            color: var(--text-primary);
        }

        .tree-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 13px;
        }

        .tree-children {
            padding-left: 16px;
        }

        .tree-children.collapsed {
            display: none;
        }

        /* 右侧主区域 */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tab栏 */
        .tab-bar {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 0 16px;
        }

        .tab-spacer {
            flex: 1;
        }

        .tab-item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .tab-item:hover {
            color: var(--text-primary);
        }

        .tab-item.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        /* Tab内容 */
        .tab-content {
            flex: 1;
            overflow: hidden;
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
        }

        /* 编辑Tab布局 */
        .edit-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .edit-left {
            width: 280px;
            min-width: 280px;
            padding: 16px;
            background: var(--card-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            overflow-x: hidden;
            justify-content: flex-start;
            align-items: stretch;
        }

        .edit-left .form-item {
            flex: 0 0 auto;
            min-width: 0;
        }

        .edit-left .spell-preview {
            min-height: 120px;
            max-height: 320px;
        }

        .edit-right {
            flex: 1;
            padding: 16px;
            padding-bottom: 80px;
            overflow-y: auto;
        }

        /* 技能预览框 */
        .spell-preview {
            background: rgba(0, 0, 0, 0.75);
            border-radius: 6px;
            padding: 12px;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            line-height: 1.6;
            min-height: 120px;
            overflow-y: auto;
        }

        .spell-preview p {
            margin-bottom: 4px;
        }

        .spell-preview hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin: 6px 0;
        }

        /* 表单样式 */
        .form-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 16px;
        }

        .form-title {
            font-weight: 500;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            min-width: 0;
        }

        .basic-info-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) minmax(120px, 0.6fr) minmax(120px, 0.7fr);
            gap: 16px;
            align-items: start;
        }

        .form-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            height: 32px;
            padding: 0 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 13px;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }

        .form-textarea {
            width: 100%;
            max-width: 100%;
            min-width: 0;
            min-height: 60px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            transition: var(--transition);
            outline: none;
            box-sizing: border-box;
        }

        @media (max-width: 1200px) {
            .basic-info-row {
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            }
        }

        @media (max-width: 860px) {
            .basic-info-row {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .form-textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
        }

        /* 按钮样式 */
        .btn {
            height: 32px;
            padding: 0 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-hover);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-secondary {
            background: #f0f2f5;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e4e7ed;
        }

        .btn-small {
            height: 26px;
            padding: 0 10px;
            font-size: 12px;
        }

        /* 单选按钮组 */
        .radio-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .radio-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            background: white;
        }

        .radio-btn:hover {
            border-color: var(--primary-color);
        }

        .radio-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* 属性列表 */
        .property-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .property-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .property-item .form-input {
            flex: 1;
        }

        .property-name-wrap {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        .property-suggest-list {
            position: absolute;
            left: 0;
            right: 0;
            top: calc(100% + 4px);
            z-index: 50;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: #fff;
            box-shadow: var(--shadow);
            display: none;
        }

        .property-suggest-list.active {
            display: block;
        }

        .property-suggest-item {
            padding: 7px 10px;
            cursor: pointer;
        }

        .property-suggest-item:hover {
            background: #f0f2f5;
        }

        .setting-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setting-item .form-input {
            flex: 1;
        }

        .property-remove {
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--text-placeholder);
            cursor: pointer;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .property-remove:hover {
            background: #fee;
            color: var(--danger-color);
        }

        /* 颜色配置 */
        .color-config-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .color-config-item label {
            width: 100px;
            font-size: 13px;
        }

        .color-picker {
            width: 40px;
            height: 32px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 2px;
            cursor: pointer;
        }

        .color-value {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        /* 底部操作栏 */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 12px 16px;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
            box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
            gap: 8px;
        }

        .bottom-left {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: auto;
        }

        .bottom-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 500;
            font-size: 15px;
        }

        .modal-body {
            padding: 16px;
            overflow-y: auto;
            flex: 1;
        }

        .modal-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* 生成结果 */
        .generate-result {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .generate-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #f5f7fa;
            border-radius: var(--radius);
        }

        .generate-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            width: 80px;
        }

        .generate-item .content {
            flex: 1;
            font-size: 12px;
            font-family: monospace;
            word-break: break-all;
            white-space: pre-wrap;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: var(--text-primary);
            color: white;
            border-radius: var(--radius);
            font-size: 13px;
            z-index: 1001;
            transform: translateX(120%);
            transition: var(--transition);
        }

        .toast.active {
            transform: translateX(0);
        }

        .toast.error {
            background: var(--danger-color);
        }

        .toast.success {
            background: var(--success-color);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #c0c4cc;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-placeholder);
            font-size: 13px;
            gap: 8px;
        }

        /* 输入组 */
        .input-group {
            display: flex;
            gap: 8px;
        }

        .input-group .form-input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <span>技能列表</span>
                <button class="btn btn-small btn-secondary" onclick="showNewCategoryModal()">+ 分类</button>
            </div>
            <div class="sidebar-content" id="treeContainer">
                <div class="root-drop-target"
                     ondragover="onRootDragOver(event)"
                     ondragleave="onRootDragLeave(event)"
                     ondrop="onRootDrop(event)">
                    拖到这里移动到根目录
                </div>
                <!-- 树形结构动态渲染 -->
            </div>
            <div class="sidebar-footer">
                <button class="btn btn-small btn-secondary" style="width: 100%;" onclick="importSpells()">导入</button>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="main-area">
            <!-- Tab栏 -->
            <div class="tab-bar">
                <div class="tab-item active" data-tab="edit" onclick="switchTab('edit')">编辑文本</div>
                <div class="tab-item" data-tab="color" onclick="switchTab('color')">色彩</div>
                <div class="tab-spacer"></div>
                <button class="btn btn-small btn-secondary" onclick="openSettingsModal()">设置</button>
            </div>

            <!-- 编辑Tab -->
            <div class="tab-content active" id="tabEdit">
                <div class="edit-layout">
                    <!-- 左侧：预览与操作 -->
                    <div class="edit-left">
                        <div class="form-item">
                            <label class="form-label">技能预览</label>
                            <div class="spell-preview" id="spellPreview">
                                <!-- 动态渲染 -->
                            </div>
                        </div>
                        <div class="form-item">
                            <label class="form-label">显示模式</label>
                            <div class="radio-group">
                                <button class="radio-btn active" data-mode="learn" onclick="setMode('learn')">学习</button>
                                <button class="radio-btn" data-mode="normal" onclick="setMode('normal')">普通</button>
                            </div>
                        </div>
                        <div class="form-item">
                            <label class="form-label">等级选择</label>
                            <div class="radio-group" id="levelSelector">
                                <!-- 动态生成 -->
                            </div>
                        </div>
                    </div>

                    <!-- 右侧：编辑表单 -->
                    <div class="edit-right">
                        <div class="form-section">
                            <div class="form-title">基本信息</div>
                            <div class="form-row basic-info-row">
                                <div class="form-item">
                                    <label class="form-label">技能ID</label>
                                    <input type="text" class="form-input" id="spellId" placeholder="A000" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">名称</label>
                                    <input type="text" class="form-input" id="spellName" placeholder="技能名称" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">热键</label>
                                    <input type="text" class="form-input" id="spellHotKey" placeholder="Q" oninput="onSpellDataChange()">
                                </div>
                                <div class="form-item">
                                    <label class="form-label">技能等级</label>
                                    <input type="number" class="form-input" id="spellLevel" min="1" max="10" value="1" oninput="onSpellLevelChange()">
                                </div>
                            </div>
                            <div class="form-item">
                                <label class="form-label">技能描述</label>
                                <textarea class="form-textarea" id="spellEffect" placeholder="例：向目标投掷一巨大的魔法锤，对其造成一定伤害并使其陷入眩晕。" oninput="onSpellDataChange()"></textarea>
                            </div>
                            <div class="form-item">
                                <label class="form-label">特点（可选）</label>
                                <input type="text" class="form-input" id="spellNature" placeholder="例：需要持续施法" oninput="onSpellDataChange()">
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">
                                技能描述
                                <span style="font-weight: normal; color: var(--text-placeholder); font-size: 11px; margin-left: 8px;">
                                    用{a}{b}标记数值位置
                                </span>
                            </div>
                            <div class="form-item">
                                <label class="form-label">普通描述文本</label>
                                <textarea class="form-textarea" id="normalWordText" placeholder="例：向目标投掷一巨大的魔法锤，对其造成{d}点伤害并使其{t}秒内处于眩晕状态。" oninput="onSpellDataChange()"></textarea>
                            </div>
                            <div class="form-item">
                                <label class="form-label">升级描述文本</label>
                                <input type="text" class="form-input" id="updateWordText" placeholder="例：{d}点伤害，{t}秒晕眩时间" oninput="onSpellDataChange()">
                            </div>
                            <div class="form-item">
                                <label class="form-label">数值参数</label>
                                <input type="text" class="form-input" id="valueParams" placeholder="例：lv=3；d=100+110；t=3+1" oninput="onSpellDataChange()">
                                <span style="font-size: 11px; color: var(--text-placeholder); margin-top: 4px; display: block;">
                                    格式：lv=等级数；参数=基础值+增量 或 参数=值1,值2,值3
                                </span>
                            </div>
                        </div>

                        <div class="form-section">
                            <div class="form-title">技能属性</div>
                            <div class="property-list" id="propertyList">
                                <!-- 动态生成 -->
                            </div>
                            <button class="btn btn-small btn-secondary" style="margin-top: 8px;" onclick="addProperty()">+ 添加属性</button>
                        </div>
                    </div>
                </div>
                <!-- 底部操作栏 -->
                <div class="bottom-bar">
                    <div class="bottom-left">
                        <span id="currentPath" style="color: var(--text-placeholder);">未保存</span>
                    </div>
                    <div class="bottom-right">
                        <button class="btn btn-success" onclick="showGenerateModal()">生成</button>
                        <button class="btn btn-secondary" onclick="resetSpellData()">恢复默认</button>
                        <button class="btn btn-secondary" onclick="saveSpellAs()">另存为</button>
                        <button class="btn btn-primary" onclick="saveSpell()">保存</button>
                    </div>
                </div>
            </div>

            <!-- 色彩Tab -->
            <div class="tab-content" id="tabColor" style="flex-direction: column;">
                <div style="flex: 1; padding: 16px; overflow-y: auto;">
                    <div class="form-section">

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================================
        // 状态管理
        // ============================================================================
        const state = {
            tree: [],
            currentSpell: null,
            currentPath: '',
            colorConfig: {},
            colorConfigs: [],
            currentColorName: 'default',
            mode: 'learn',
            level: 1,
            maxLevel: 1,
            settings: {}
        };

        const defaultSpellData = {
            id: 'A000',
            lv: 1,
            name: '',
            hotKey: '',
            effect: '',
            nature: '',
            pros: [{name: '法力消耗', val: ''}],
            updateWord: {text: '', vals: []},
            normalWord: {text: '', vals: []}
        };

        const defaultColorConfig = {
            learnLevel: '#33ccff',
            property: '#33cc33',
            hotKey: '#ffcc00',
            learnUpdateLevel: '#ff9900',
            nature: '#ffcccc'
        };

        const defaultSpellProSuggestionList = [
            '法力消耗',
            '施法距离',
            '冷却时间',
            '持续时间',
            '法术范围',
            '吟唱时间'
        ];

        // ============================================================================
        // API调用
        // ============================================================================
        const API_METHOD_ALIASES = {
            wc3_get_initial_state: ['get_initial_state', 'get_initial_state_wc3', 'get_initial_state_v2'],
            wc3_get_spell_tree: ['get_spell_tree'],
            wc3_get_color_configs: ['get_color_configs'],
            wc3_get_settings: ['get_settings']
        };

        function toCamelCase(name) {
            return String(name || '').replace(/_([a-z])/g, (_, c) => c.toUpperCase());
        }

        function getApiMethodCandidates(method) {
            const aliases = API_METHOD_ALIASES[method] || [];
            const raw = [method, ...aliases].filter(Boolean);
            const candidates = [];
            raw.forEach(name => {
                candidates.push(name);
                candidates.push(toCamelCase(name));
            });
            return Array.from(new Set(candidates));
        }

        function hasApiMethod(api, method) {
            try {
                if (!api) return false;
                const val = api[method];
                return val !== undefined && val !== null;
            } catch (_) {
                return false;
            }
        }

        function resolveApiMethodName(method) {
            const api = window.pywebview?.api;
            if (!api) return null;
            const candidates = getApiMethodCandidates(method);
            for (const candidate of candidates) {
                if (hasApiMethod(api, candidate)) {
                    return candidate;
                }
            }
            return null;
        }

        async function waitForApiMethod(method, timeoutMs = 4000) {
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
                const resolved = resolveApiMethodName(method);
                if (resolved) {
                    return resolved;
                }
                await new Promise(r => setTimeout(r, 50));
            }
            return null;
        }

        async function waitForPywebviewApi(timeoutMs = 4000) {
            const start = Date.now();
            while (Date.now() - start < timeoutMs) {
                if (window.pywebview?.api) {
                    return true;
                }
                await new Promise(r => setTimeout(r, 50));
            }
            return false;
        }

        async function callApi(method, payload = {}) {
            if (!window.pywebview || !window.pywebview.api) {
                throw new Error('pywebview API unavailable');
            }
            let resolvedMethod = resolveApiMethodName(method);
            if (!resolvedMethod) {
                resolvedMethod = await waitForApiMethod(method, 4000);
            }
            if (!resolvedMethod) {
                throw new Error(`API method not found: ${method}`);
            }
            const apiMethod = window.pywebview.api[resolvedMethod];
            if (typeof apiMethod !== 'function') {
                throw new Error(`API method not callable: ${resolvedMethod}`);
            }
            return apiMethod(payload);
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast active ' + type;
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function escapeAttr(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeJsString(str) {
            return String(str || '')
                .replace(/\\/g, '\\\\')
                .replace(/'/g, "\\'");
        }

        function normalizePath(path) {
            return String(path || '').replace(/\\/g, '/');
        }

        function dedupeStringsKeepOrder(list) {
            const src = Array.isArray(list) ? list : [];
            const seen = new Set();
            const result = [];
            src.forEach(item => {
                const val = String(item || '').trim();
                if (!val || seen.has(val)) return;
                seen.add(val);
                result.push(val);
            });
            return result;
        }

        function getEmptyInitialStateData() {
            return {
                tree: [],
                colorConfigs: [],
                currentColorConfig: {...defaultColorConfig},
                currentColorName: 'default',
                settings: {
                    spellProSuggestions: [...defaultSpellProSuggestionList]
                },
                defaultSpellData: {...defaultSpellData}
            };
        }

        function normalizeInitialStateData(data) {
            const source = (data && typeof data === 'object') ? data : {};
            const normalized = getEmptyInitialStateData();

            normalized.tree = Array.isArray(source.tree) ? source.tree : [];
            normalized.colorConfigs = Array.isArray(source.colorConfigs) ? source.colorConfigs : [];
            normalized.currentColorConfig = source.currentColorConfig && typeof source.currentColorConfig === 'object'
                ? {...defaultColorConfig, ...source.currentColorConfig}
                : {...defaultColorConfig};
            normalized.currentColorName = typeof source.currentColorName === 'string' && source.currentColorName
                ? source.currentColorName
                : 'default';
            normalized.settings = source.settings && typeof source.settings === 'object'
                ? {...source.settings}
                : {};
            normalized.settings.spellProSuggestions = dedupeStringsKeepOrder(
                normalized.settings.spellProSuggestions || defaultSpellProSuggestionList
            );
            normalized.defaultSpellData = source.defaultSpellData && typeof source.defaultSpellData === 'object'
                ? {...defaultSpellData, ...source.defaultSpellData}
                : {...defaultSpellData};

            return normalized;
        }

        function applyInitialStateData(data) {
            const normalized = normalizeInitialStateData(data);
            state.tree = normalized.tree;
            state.colorConfigs = normalized.colorConfigs;
            state.colorConfig = normalized.currentColorConfig;
            state.currentColorName = normalized.currentColorName;
            state.settings = normalized.settings;

            renderTree();
            loadColorConfigToForm(state.colorConfig);
            renderColorConfigSelect();
            resetSpellData();

            const rawLevel = parseInt(normalized.defaultSpellData?.level ?? normalized.defaultSpellData?.lv ?? 1) || 1;
            const level = Math.min(Math.max(rawLevel, 1), 10);
            document.getElementById('spellLevel').value = level;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制到剪贴板', 'success');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('已复制到剪贴板', 'success');
            });
        }

        // WC3颜色代码生成
        function dyeing(str, color) {
            if (!color) return str;
            return '|cff' + color.replace('#', '') + str + '|r';
        }

        // 字符串模板填充
        String.prototype.format = function(obj) {
            let str = this;
            if (!obj || typeof obj !== 'object') return str;
            for (const key in obj) {
                const regex = new RegExp('\\{' + key + '\\}', 'g');
                str = str.replace(regex, obj[key]);
            }
            return str;
        };

        // 数值参数解析（兼容旧格式 [lv=3][a=5+10] 与新格式 lv=3；a=5+10）
        function parseValueParams(str) {
            if (!str || typeof str !== 'string') return {lv: 1, params: {}};

            const raw = String(str).trim();
            if (!raw) return {lv: 1, params: {}};

            if (raw.includes('[') && raw.includes(']')) {
                return parseOldBracketFormat(raw);
            }
            return parseSemicolonFormat(raw);
        }

        function parseOldBracketFormat(str) {
            let lv = 1;
            const params = {};

            const lvMatch = str.match(/\[lv\s*=\s*(\d+)\]/i);
            if (lvMatch) {
                lv = Math.max(parseInt(lvMatch[1]) || 1, 1);
            }

            const regex = /\[([a-zA-Z]+)\s*=\s*([^\]]+)\]/g;
            let match;
            while ((match = regex.exec(str)) !== null) {
                const key = match[1].trim().toLowerCase();
                const value = match[2].trim();
                if (!key || key === 'lv' || !value) continue;
                params[key] = value;
            }

            return {lv, params};
        }

        function parseSemicolonFormat(str) {
            let lv = 1;
            const params = {};

            const parts = str.split(/[;；]/);
            parts.forEach(part => {
                const item = String(part || '').trim();
                if (!item) return;
                const eqIdx = item.indexOf('=');
                if (eqIdx <= 0) return;

                const key = item.slice(0, eqIdx).trim().toLowerCase();
                const value = item.slice(eqIdx + 1).trim();
                if (!key || !value) return;

                if (key === 'lv') {
                    lv = Math.max(parseInt(value) || 1, 1);
                } else {
                    params[key] = value;
                }
            });

            return {lv, params};
        }

        function generateValues(lv, params) {
            const total = Math.max(parseInt(lv) || 1, 1);
            const result = [];
            for (let i = 0; i < total; i++) {
                const obj = {};
                Object.keys(params || {}).forEach(key => {
                    const val = String(params[key] || '').trim();
                    if (!val) return;
                    if (val.includes('+')) {
                        const [baseRaw, plusRaw] = val.split('+');
                        const base = parseFloat((baseRaw || '').trim());
                        const plus = parseFloat((plusRaw || '').trim());
                        if (!Number.isNaN(base) && !Number.isNaN(plus)) {
                            obj[key] = base + plus * i;
                            return;
                        }
                    }
                    if (val.includes(',')) {
                        const vals = val.split(',').map(v => String(v || '').trim());
                        obj[key] = vals[i] !== undefined ? vals[i] : (vals[vals.length - 1] || '');
                        return;
                    }
                    obj[key] = val;
                });
                result.push(obj);
            }
            return result;
        }

        function paramsToSaveFormat(lv, params) {
            const parts = [`lv=${Math.max(parseInt(lv) || 1, 1)}`];
            Object.keys(params || {}).forEach(key => {
                const val = String(params[key] || '').trim();
                if (!key || !val) return;
                parts.push(`${key}=${val}`);
            });
            return parts.join('；');
        }

        // ============================================================================
        // 树形结构渲染
        // ============================================================================
        function renderTree() {
            const container = document.getElementById('treeContainer');
            const rootDrop = `
                <div class="root-drop-target"
                     ondragover="onRootDragOver(event)"
                     ondragleave="onRootDragLeave(event)"
                     ondrop="onRootDrop(event)">
                    拖到这里移动到根目录
                </div>
            `;
            container.innerHTML = rootDrop + renderTreeItems(state.tree);
        }

        function renderTreeItems(items, depth = 0) {
            if (!items || items.length === 0) return '';
            return items.map(item => {
                if (item.type === 'category') {
                    const hasChildren = item.children && item.children.length > 0;
                    const expandIcon = item.expanded ? '▼' : '▶';
                    const itemPath = normalizePath(item.path || '');
                    const safePath = escapeJsString(itemPath);
                    return `
                        <div class="tree-item">
                            <div class="tree-row"
                                 onclick="toggleCategory('${safePath}')"
                                 oncontextmenu="showTreeContextMenu(event, 'category', '${safePath}')"
                                 ondragover="onCategoryDragOver(event)"
                                 ondragleave="onCategoryDragLeave(event)"
                                 ondrop="onCategoryDrop(event, '${safePath}')"
                                 data-drop-path="${escapeAttr(itemPath)}">
                                ${hasChildren ? `<span class="tree-expand">${expandIcon}</span>` : '<span class="tree-expand"></span>'}
                                <span class="tree-icon">📁</span>
                                <span class="tree-name">${item.name}</span>
                            </div>
                            <div class="tree-children ${item.expanded ? '' : 'collapsed'}">
                                ${renderTreeItems(item.children, depth + 1)}
                            </div>
                        </div>
                    `;
                } else {
                    const itemPath = normalizePath(item.path || '');
                    const safePath = escapeJsString(itemPath);
                    return `
                        <div class="tree-item">
                            <div class="tree-row ${normalizePath(state.currentPath) === itemPath ? 'selected' : ''}"
                                 onclick="selectSpell('${safePath}')"
                                 oncontextmenu="showTreeContextMenu(event, 'spell', '${safePath}')"
                                 draggable="true"
                                 ondragstart="onSpellDragStart(event, '${safePath}')"
                                 ondragend="onSpellDragEnd(event)">
                                <span class="tree-expand"></span>
                                <span class="tree-icon">📄</span>
                                <span class="tree-name">${item.name}</span>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function toggleCategory(path) {
            const targetPath = normalizePath(path);
            function toggle(items) {
                for (const item of items) {
                    if (normalizePath(item.path) === targetPath && item.type === 'category') {
                        item.expanded = !item.expanded;
                        return true;
                    }
                    if (item.children && toggle(item.children)) return true;
                }
                return false;
            }
            toggle(state.tree);
            renderTree();
        }

        const dragState = {
            expandTimers: {}
        };

        function clearAllExpandTimers() {
            Object.keys(dragState.expandTimers).forEach(key => {
                clearTimeout(dragState.expandTimers[key]);
                delete dragState.expandTimers[key];
            });
        }

        function onSpellDragStart(event, spellPath) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', normalizePath(spellPath));
            event.currentTarget.classList.add('dragging');
        }

        function onSpellDragEnd(event) {
            event.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.tree-row.drag-over').forEach(el => el.classList.remove('drag-over'));
            clearAllExpandTimers();
        }

        function onCategoryDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const row = event.currentTarget;
            row.classList.add('drag-over');

            const categoryPath = normalizePath(row.dataset.dropPath || '');
            if (!categoryPath) return;

            if (!dragState.expandTimers[categoryPath]) {
                dragState.expandTimers[categoryPath] = setTimeout(() => {
                    delete dragState.expandTimers[categoryPath];
                    expandCategoryIfCollapsed(categoryPath);
                }, 450);
            }
        }

        function onCategoryDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
            const categoryPath = normalizePath(event.currentTarget.dataset.dropPath || '');
            if (categoryPath && dragState.expandTimers[categoryPath]) {
                clearTimeout(dragState.expandTimers[categoryPath]);
                delete dragState.expandTimers[categoryPath];
            }
        }

        function expandCategoryIfCollapsed(path) {
            let changed = false;
            function walk(items) {
                for (const item of items || []) {
                    if (item.type === 'category' && normalizePath(item.path) === path) {
                        if (!item.expanded) {
                            item.expanded = true;
                            changed = true;
                        }
                        return true;
                    }
                    if (item.children && walk(item.children)) return true;
                }
                return false;
            }
            walk(state.tree);
            if (changed) {
                renderTree();
            }
        }

        async function moveSpellToCategory(fromPath, toCategoryPath) {
            const from = normalizePath(fromPath);
            const to = normalizePath(toCategoryPath || '');
            try {
                const result = await callApi('wc3_move_spell', {
                    fromPath: from,
                    toCategoryPath: to
                });
                if (result.success) {
                    showToast(result.message || '移动成功', 'success');
                    if (normalizePath(state.currentPath) === from) {
                        state.currentPath = normalizePath(result.data?.path || state.currentPath);
                        document.getElementById('currentPath').textContent = state.currentPath || '未保存';
                    }
                    await refreshTree();
                } else {
                    showToast(result.message || '移动失败', 'error');
                }
            } catch (e) {
                showToast('移动失败: ' + e.message, 'error');
            }
        }

        async function onCategoryDrop(event, categoryPath) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            clearAllExpandTimers();

            const fromPath = normalizePath(event.dataTransfer.getData('text/plain'));
            if (!fromPath) return;
            await moveSpellToCategory(fromPath, categoryPath);
        }

        function onRootDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            event.currentTarget.classList.add('drag-over');
        }

        function onRootDragLeave(event) {
            event.currentTarget.classList.remove('drag-over');
        }

        async function onRootDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            clearAllExpandTimers();

            const fromPath = normalizePath(event.dataTransfer.getData('text/plain'));
            if (!fromPath) return;
            await moveSpellToCategory(fromPath, '');
        }

        async function selectSpell(path) {
            try {
                const result = await callApi('wc3_load_spell', {path});
                if (result.success) {
                    state.currentSpell = migrateData(result.data);
                    state.currentPath = normalizePath(path);
                    loadSpellToForm(state.currentSpell);
                    renderTree();
                    document.getElementById('currentPath').textContent = state.currentPath;
                } else {
                    showToast(result.message || '加载失败', 'error');
                }
            } catch (e) {
                showToast('加载技能失败: ' + e.message, 'error');
            }

        function reverseEngineerParamsFromVals(vals) {
            if (!Array.isArray(vals) || vals.length === 0) return '';
            const keys = Object.keys(vals[0] || {});
            if (keys.length === 0) return '';

            const params = {};
            keys.forEach(key => {
                const series = vals.map(v => v?.[key]);
                if (series.length < 2) {
                    params[key] = String(series[0] ?? '');
                    return;
                }
                const nums = series.map(v => Number(v));
                const allNum = nums.every(v => !Number.isNaN(v));
                if (allNum) {
                    const diff = nums[1] - nums[0];
                    const isArithmetic = nums.every((v, i) => i < 2 || v - nums[i - 1] === diff);
                    if (isArithmetic && diff !== 0) {
                        params[key] = `${nums[0]}+${diff}`;
                        return;
                    }
                }
                params[key] = series.map(v => String(v ?? '')).join(',');
            });

            return paramsToSaveFormat(vals.length, params);
        }

        function migrateData(data) {
            const migrated = {...defaultSpellData, ...(data || {})};
            migrated.level = parseInt(migrated.level ?? migrated.lv ?? 1) || 1;
            migrated.lv = migrated.level;

            if (!Array.isArray(migrated.pros)) {
                migrated.pros = [{name: '法力消耗', val: ''}];
            }
            if (!migrated.updateWord || typeof migrated.updateWord !== 'object') {
                migrated.updateWord = {text: '', vals: []};
            }
            if (!migrated.normalWord || typeof migrated.normalWord !== 'object') {
                migrated.normalWord = {text: '', vals: []};
            }

            let valueParams = String(migrated.valueParams || '').trim();
            if (!valueParams) {
                const oldUpdate = String(migrated.updateWordVals || '').trim();
                const oldNormal = String(migrated.normalWordVals || '').trim();
                valueParams = oldUpdate || oldNormal;
            }
            if (!valueParams) {
                valueParams = reverseEngineerParamsFromVals(migrated.updateWord.vals) ||
                    reverseEngineerParamsFromVals(migrated.normalWord.vals) ||
                    'lv=1';
            }

            const parsed = parseValueParams(valueParams);
            migrated.valueParams = paramsToSaveFormat(parsed.lv, parsed.params);
            return migrated;
        }

        function showPropertySuggestions(index, keyword = null) {
            const listEl = document.getElementById(`propertySuggestList_${index}`);
            const allItems = document.querySelectorAll('.property-item');
            const row = allItems[index];
            if (!listEl || !row) return;
            const input = row.querySelector('.property-name-input');
            if (!input) return;

            const query = (keyword === null ? input.value : keyword).trim().toLowerCase();
            const candidates = getSpellProSuggestions().filter(name => {
                if (!query) return true;
                return name.toLowerCase().includes(query);
            });

            if (candidates.length === 0) {
                listEl.classList.remove('active');
                listEl.innerHTML = '';
                return;
            }

            listEl.innerHTML = candidates.map(name => (
                `<div class="property-suggest-item" onmousedown="selectPropertySuggestion(${index}, '${escapeJsString(name)}')">${escapeHtml(name)}</div>`
            )).join('');
            listEl.classList.add('active');

        function renderSpellPreview() {
            const preview = document.getElementById('spellPreview');
            const spell = state.currentSpell;
            if (!spell) {
                preview.innerHTML = '<p>请输入技能信息</p>';
                return;
            }

            const colors = state.colorConfig;
            const lv = state.level;
            const mode = state.mode;
            const parsed = parseValueParams(spell.valueParams || '');
            const vals = generateValues(parsed.lv, parsed.params);

            let html = '';
            if (mode === 'learn') {
                // 学习模式
                html = `<p>学习 <span style="color:${colors.learnLevel}">${lv}级</span> ${spell.name || '技能名称'}`;
                if (spell.hotKey) {
                    html += ` (<span style="color:${colors.hotKey}">${spell.hotKey}</span>)`;
                }
                html += '</p><hr>';

                html += `<p>${spell.effect || ''}`;
                if (spell.nature) {
                    html += `<br><br><span style="color:${colors.nature}">${spell.nature}</span>`;
                }
                html += '<br><br>';

                // 属性
                spell.pros?.forEach(p => {
                    if (p.name && p.val) {
                        html += `<span style="color:${colors.property}">${p.name}：</span>${p.val}<br>`;
                    }
                });

                // 升级描述
                if (spell.updateWord?.text && vals.length > 0) {
                    vals.forEach((v, i) => {
                        let text = spell.updateWord.text.format(v);
                        if (!text.endsWith('。')) text += '。';
                        html += `<br><span style="color:${colors.learnUpdateLevel}">${i + 1}级</span> - ${text}`;
                    });
                }
                html += '</p>';
            } else {
                // 普通模式
                html = `<p>${spell.name || '技能名称'}`;
                if (spell.hotKey) {
                    html += ` (<span style="color:${colors.hotKey}">${spell.hotKey}</span>)`;
                }
                html += ` - [<span style="color:${colors.learnLevel}">${lv}级</span>]</p><hr>`;

                let normalText = spell.normalWord?.text || '';
                if (normalText && vals[lv - 1]) {
                    normalText = normalText.format(vals[lv - 1]);
                }
                if (!normalText.endsWith('。') && normalText) normalText += '。';
                html += `<p>${normalText}`;

                if (spell.nature) {
                    html += `<br><br><span style="color:${colors.nature}">${spell.nature}</span>`;
                }

                // 属性（排除法力消耗）
                const pros = spell.pros?.filter(p => p.name !== '法力消耗') || [];
                if (pros.length > 0) {
                    html += '<br><br>';
                    pros.forEach(p => {
                        if (p.name && p.val) {
                            html += `<span style="color:${colors.property}">${p.name}：</span>${p.val}<br>`;
                        }
                    });
                }
                html += '</p>';
            }

            preview.innerHTML = html;
        }

        function showGenerateModal() {
            const spell = state.currentSpell;
            if (!spell || !spell.name) {
                showToast('请先填写技能信息', 'error');
                return;
            }

            const colors = state.colorConfig;
            const result = document.getElementById('generateResult');
            let html = '';
            const parsed = parseValueParams(spell.valueParams || '');
            const vals = generateValues(parsed.lv, parsed.params);

            // 学习标题
            let learnTitle = `学习 ${dyeing('%d 级', colors.learnLevel)} ${spell.name}`;
            if (spell.hotKey) {
                learnTitle += `(${dyeing(spell.hotKey, colors.hotKey)})`;
            }
            html += createGenerateItem('学习标题', learnTitle);

            // 学习扩展
            let learnExport = spell.effect + '\n';
            if (spell.nature) learnExport += spell.nature + '\n';
            spell.pros?.forEach(p => {
                if (p.name && p.val) {
                    learnExport += `\n${dyeing(p.name, colors.property)}：${p.val}`;
                }
            });
            if (spell.updateWord?.text && vals.length > 0) {
                learnExport += '\n';
                vals.forEach((v, i) => {
                    let text = spell.updateWord.text.format(v);
                    if (!text.endsWith('。')) text += '。';
                    learnExport += `\n${dyeing((i + 1) + '级', colors.learnUpdateLevel)} - ${text}`;
                });
            }
            html += createGenerateItem('学习扩展', learnExport);

            // 各等级
            const maxLv = Math.max(vals.length, 1);
            for (let lv = 1; lv <= maxLv; lv++) {
                // 标题
                let title = `${spell.name}`;
                if (spell.hotKey) {
                    title += `(${dyeing(spell.hotKey, colors.hotKey)})`;
                }
                title += ` - [${dyeing(lv + ' 级', colors.learnLevel)}]`;
                html += createGenerateItem(`${lv}级标题`, title);

                // 扩展
                let normalText = spell.normalWord?.text || '';
                if (normalText && vals[lv - 1]) {
                    normalText = normalText.format(vals[lv - 1]);
                }
                if (!normalText.endsWith('。') && normalText) normalText += '。';

                let exportText = normalText;
                if (spell.nature) exportText += '\n' + spell.nature;

                const pros = spell.pros?.filter(p => p.name !== '法力消耗') || [];
                if (pros.length > 0) {
                    exportText += '\n';
                    pros.forEach(p => {
                        if (p.name && p.val) {
                            exportText += `\n${dyeing(p.name, colors.property)}：${p.val}`;
                        }
                    });
                }
                html += createGenerateItem(`${lv}级扩展`, exportText);
            }

            result.innerHTML = html;
            openModal('generateModal');
        }

        function createGenerateItem(label, content) {
            return `
                <div class="generate-item">
                    <span class="label">${label}</span>
                    <span class="content">${escapeHtml(content)}</span>
                    <button class="btn btn-small btn-primary" onclick="copyToClipboard(\`${escapeBacktick(content)}\`)">复制</button>
                </div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeBacktick(str) {
            return str.replace(/`/g, '\\`').replace(/\n/g, '\\n');
        }

                const path = state.currentPath;

                const categoryPath = parts.length > 1 ? parts.slice(0, -1).join('/') : '';
                const filename = parts.length > 0 ? parts[parts.length - 1].replace('.json', '') : spell.name;

                const result = await callApi('wc3_save_spell', {
                    path: categoryPath,
                    filename: filename || spell.name,
                    data: spell

                if (result.success) {
                    showToast('保存成功', 'success');
                    state.currentPath = normalizePath(result.data?.path || path);
                    document.getElementById('currentPath').textContent = state.currentPath;
                    await refreshTree();

            container.innerHTML = list.map((name, i) => `
                <div class="setting-item">
                    <input type="text" class="form-input spell-pro-setting-input" value="${escapeAttr(name)}" placeholder="属性名称">
                    <button class="btn btn-small btn-danger" onclick="removeSpellProSuggestion(${i})">删除</button>
                </div>
            `).join('');
        }

        function getSpellProSuggestionSettingsFromForm() {
            return dedupeStringsKeepOrder(Array.from(document.querySelectorAll('.spell-pro-setting-input')).map(input => input.value || ''));
        }

        function openSettingsModal() {
            renderSpellProSuggestionSettings();
            openModal('settingsModal');
        }

        function addSpellProSuggestion() {
            const current = getSpellProSuggestionSettingsFromForm();
            current.push('');
            state.settings.spellProSuggestions = dedupeStringsKeepOrder(current);
            renderSpellProSuggestionSettings();
        }

        function removeSpellProSuggestion(index) {
            const current = getSpellProSuggestionSettingsFromForm();
            if (index >= 0 && index < current.length) {
                current.splice(index, 1);
            }
            state.settings.spellProSuggestions = dedupeStringsKeepOrder(current);
            renderSpellProSuggestionSettings();
        }

        function resetSpellProSuggestions() {
            state.settings.spellProSuggestions = [...defaultSpellProSuggestionList];
            renderSpellProSuggestionSettings();
        }

        async function saveSettings() {
            const spellProSuggestions = getSpellProSuggestionSettingsFromForm();
            const finalList = spellProSuggestions.length > 0 ? spellProSuggestions : [...defaultSpellProSuggestionList];
            try {
                const result = await callApi('wc3_save_settings', {
                    spellProSuggestions: finalList
                });
                if (result.success) {
                    state.settings.spellProSuggestions = dedupeStringsKeepOrder(finalList);
                    closeModal('settingsModal');
                    showToast('设置保存成功', 'success');
                } else {
                    showToast(result.message || '设置保存失败', 'error');
                }
            } catch (e) {
                showToast('设置保存失败: ' + e.message, 'error');
            }
        }

        function renderColorExamplePreview() {
            const preview = document.getElementById('colorExamplePreview');
            const colors = state.colorConfig;

            preview.innerHTML = `
                <p>学习 <span style="color:${colors.learnLevel}">1级</span> 风暴之锤 (<span style="color:${colors.hotKey}">T</span>)</p>
                <hr>
                <p>向目标投掷一巨大的魔法锤，对其造成一定伤害并使其陷入眩晕。
                <br><br>
                <span style="color:${colors.property}">法力消耗：</span>75
                <br>
                <span style="color:${colors.property}">施法距离：</span>800
                <br><br>
                <span style="color:${colors.learnUpdateLevel}">1级</span> - 100点伤害，3秒晕眩时间。
                <br>
                <span style="color:${colors.learnUpdateLevel}">2级</span> - 210点伤害，4秒晕眩时间。
                </p>
            `;
        }

        // ============================================================================
        // Tab切换
        // ============================================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.toggle('active', item.dataset.tab === tab);
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
            });
        }

        document.addEventListener('click', (event) => {
            if (!event.target.closest('.property-name-wrap')) {
                hideAllPropertySuggestLists();
            }
        });

        // ============================================================================
        // 初始化
        // ============================================================================
        async function bootstrap() {
            try {
                // 等待API就绪
                const ready = await waitForPywebviewApi(4000);
                if (!ready) {
                    throw new Error('pywebview API unavailable');
                }

                // 获取初始状态
                const result = await callApi('wc3_get_initial_state');
                if (!result || !result.success) {
                    throw new Error(result?.message || 'Initialization API returned failure');
                }
                applyInitialStateData(result.data);
            } catch (e) {
                console.error('初始化失败:', e);
                if (e?.message && (e.message.includes('API method not found') || e.message.includes('pywebview API unavailable'))) {
                    console.warn('[WC3] API not available, using fallback initial state.', e.message);
                    applyInitialStateData(getEmptyInitialStateData());
                    return;
                }
                showToast('初始化失败: ' + e.message, 'error');
            }
        }

        // 监听pywebview就绪
        window.addEventListener('pywebviewready', bootstrap);
        setTimeout(() => {
            if (window.pywebview?.api) bootstrap();
        }, 100);
    </script>
</body>
</html>
